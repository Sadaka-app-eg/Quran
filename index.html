<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق القرآن - تجربة وحي</title>
    <style>
        :root {
            --bg-color: #0c120c;
            --card-bg: #141e15;
            --gold: #d4af37;
            --text-color: #f1f1f1;
            --text-secondary: #9aa79c;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Amiri', 'Traditional Arabic', sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 📌 شريط التحكم بالصفحات */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 450px;
            margin-bottom: 15px;
            background: var(--card-bg);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-sizing: border-box;
        }

        .btn {
            background: var(--gold);
            color: #111;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 📖 إطار المصحف */
        .mushaf-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            background: #fff;
        }

        .mushaf-img {
            width: 100%;
            display: block;
            pointer-events: none; /* منع سحب الصورة */
        }

        /* 🎨 طبقة التفاعل SVG فوق الصورة */
        .interactive-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        /* 📲 النافذة السفلية للخيارات (Bottom Sheet) */
        .bottom-modal {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 2px solid var(--gold);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
            transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            max-width: 500px;
            margin: 0 auto;
        }

        .bottom-modal.active {
            bottom: 0;
        }

        .modal-title {
            color: var(--gold);
            margin: 0 0 10px 0;
            font-size: 18px;
        }

        .modal-text {
            color: #fff;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
        }

        .close-btn {
            background: rgba(255, 77, 77, 0.2);
            color: #ff4d4d;
            border-color: #ff4d4d;
        }
    </style>
</head>
<body>

    <!-- شريط تنقل الصفحات -->
    <div class="controls">
        <button class="btn" onclick="changePage(-1)">السابقة ◀</button>
        <span id="pageInfo" style="color: var(--gold); font-weight: bold;">صفحة 3</span>
        <button class="btn" onclick="changePage(1)">▶ التالية</button>
    </div>

    <!-- إطار ورقة المصحف التفاعلية -->
    <div class="mushaf-wrapper" id="mushafWrapper">
        <img id="mushafImage" class="mushaf-img" src="https://android.quran.com/data/images_1024/page003.png" alt="صفحة المصحف">
        <svg class="interactive-svg" id="svgOverlay" viewBox="0 0 1080 1920"></svg>
    </div>

    <!-- النافذة السفلية للخيارات عند الضغط المطول -->
    <div class="bottom-modal" id="bottomModal">
        <h3 class="modal-title" id="verseTitle">سورة البقرة - آية 6</h3>
        <div class="modal-text" id="verseText">إِنَّ الَّذِينَ كَفَرُوا سَوَاءٌ عَلَيْهِمْ أَأَنْذَرْتَهُمْ أَمْ لَمْ تُنْذِرْهُمْ لَا يُؤْمِنُونَ</div>
        <div class="modal-actions">
            <button class="action-btn" onclick="playAudio()">🎙️ استماع</button>
            <button class="action-btn" onclick="openTafsir()">📖 التفسير</button>
            <button class="action-btn" onclick="copyText()">📋 نسخ</button>
            <button class="action-btn close-btn" onclick="closeModal()">إغلاق</button>
        </div>
    </div>

    <script>
        let currentPage = 3;
        const totalPages = 604;
        let longPressTimer = null;
        let activeVerse = null;

        // دالة تغيير الصفحة
        function changePage(delta) {
            currentPage += delta;
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;

            const pageStr = String(currentPage).padStart(3, '0');
            document.getElementById('mushafImage').src = `https://android.quran.com/data/images_1024/page${pageStr}.png`;
            document.getElementById('pageInfo').textContent = `صفحة ${currentPage}`;
            closeModal();
            loadVerseCoordinates(currentPage);
        }

        // محاكاة تحميل إحداثيات الآيات للصفحة
        function loadVerseCoordinates(page) {
            const svg = document.getElementById('svgOverlay');
            svg.innerHTML = ''; // تنظيف الطبقة

            // إضافة منطقة تفاعلية وهمية كمثال تجريبي فوق أول آية بالصفحة
            const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            polygon.setAttribute('points', '100,200 980,200 980,450 100,450');
            polygon.setAttribute('fill', 'transparent');

            // ربط أحداث الضغط المطول (Long Press)
            attachLongPress(polygon, {
                title: `سورة البقرة - صفحة ${page}`,
                text: "إِنَّ الَّذِينَ كَفَرُوا سَوَاءٌ عَلَيْهِمْ أَأَنْذَرْتَهُمْ أَمْ لَمْ تُنْذِرْهُمْ لَا يُؤْمِنُونَ"
            });

            svg.appendChild(polygon);
        }

        // دالة التقاط الضغط المطول
        function attachLongPress(element, verseData) {
            const start = (e) => {
                element.setAttribute('fill', 'rgba(212, 175, 55, 0.3)'); // تظليل ذهبي وقت الضغط
                longPressTimer = setTimeout(() => {
                    openModal(verseData);
                }, 450);
            };

            const cancel = () => {
                element.setAttribute('fill', 'transparent');
                if (longPressTimer) clearTimeout(longPressTimer);
            };

            element.addEventListener('touchstart', start);
            element.addEventListener('touchend', cancel);
            element.addEventListener('touchmove', cancel);
            element.addEventListener('mousedown', start);
            element.addEventListener('mouseup', cancel);
            element.addEventListener('mouseleave', cancel);
        }

        function openModal(data) {
            document.getElementById('verseTitle').textContent = data.title;
            document.getElementById('verseText').textContent = data.text;
            document.getElementById('bottomModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('bottomModal').classList.remove('active');
        }

        function playAudio() { alert('🎧 جاري تشغيل صوت الآية...'); }
        function openTafsir() { alert('📖 التفسير الميسر للآية جاهز!'); }
        function copyText() {
            const text = document.getElementById('verseText').textContent;
            navigator.clipboard.writeText(text);
            alert('📋 تم نسخ النص بنجاح!');
        }

        // تحميل الصفحة الأولى أول ما يفتح
        loadVerseCoordinates(currentPage);
    </script>
</body>
</html>
