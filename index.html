<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>تطبيق أثر - مصحف QCF V2 المتجهي</title>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Reem+Kufi:wght@600;700&display=swap" rel="stylesheet">

  <style>
    /* تحميل خط QCF V2 للصفحة الأولى كمثال ديناميكي */
    @font-face {
      font-family: 'QCF2_P1';
      src: url('https://quran.com/fonts/quran/hafs/v2/woff2/p1.woff2') format('woff2');
      font-display: swap;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background-color: #0b1411;
      color: #e2e8f0;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }

    /* كلاس الخط العثماني الناقل للرموز والكلمات */
    .qcf-v2-text {
      font-family: 'QCF2_P1', serif;
      direction: rtl;
      text-align-last: justify; /* محاكاة محاذاة أسطر المصحف الـ 15 */
      line-height: 2.2;
    }

    /* تمييز الآية أو الكلمة بالتأثير الذهبي */
    .word-active {
      background-color: rgba(201, 162, 39, 0.25);
      color: #fce788 !important;
      border-radius: 4px;
      box-shadow: 0 0 8px rgba(201, 162, 39, 0.4);
    }

    .surah-header-v2 {
      font-family: 'Reem Kufi', sans-serif;
      background: linear-gradient(90deg, transparent, rgba(184, 134, 47, 0.2), transparent);
      border: 1px solid rgba(184, 134, 47, 0.4);
    }
  </style>
</head>
<body class="bg-[#0b1411]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const TOTAL_PAGES = 604;

    const numeralsAr = ["٠","١","٢","٣","٤","٥","٦","٧","٨","٩"];
    function toArabicNumber(n) {
      return String(n).split("").map(d => numeralsAr[+d] ?? d).join("");
    }

    function App() {
      const [page, setPage] = useState(1);
      const [night, setNight] = useState(true);
      const [words, setWords] = useState([]);
      const [selectedAyahKey, setSelectedAyahKey] = useState(null);
      const [loading, setLoading] = useState(true);
      const [meta, setMeta] = useState({ surahName: "سُورَةُ الفَاتِحَة", juz: 1 });

      // السحب والتنقل
      const touchStartX = useRef(0);
      const touchEndX = useRef(0);

      // جلب الكلمات والتخطيط من API Quran.com المعتمد على QCF V2
      useEffect(() => {
        const fetchQCFData = async () => {
          setLoading(true);
          try {
            // جلب أسطر وكلمات الصفحة بجودة QCF V2
            const res = await fetch(`https://api.quran.com/api/v4/verses/by_page/${page}?words=true&word_fields=code_v2,line_number,location`);
            const json = await res.json();
            
            if (json.verses) {
              let allWords = [];
              json.verses.forEach(verse => {
                verse.words.forEach(word => {
                  allWords.push({
                    id: word.id,
                    code: word.code_v2,
                    lineNumber: word.line_number,
                    ayahKey: verse.verse_key,
                    charType: word.char_type_name
                  });
                });
              });
              setWords(allWords);
              setMeta({
                surahName: json.verses[0]?.words[0]?.code_v2 ? "سُورَةُ الفَاتِحَة" : "المصحف الشريف",
                juz: json.verses[0]?.juz_number || 1
              });
            }
          } catch (e) {
            console.error(e);
          } finally {
            setLoading(false);
          }
        };

        fetchQCFData();
      }, [page]);

      // ديناميكية تحميل خط QCF V2 الخاص برقم الصفحة
      useEffect(() => {
        const fontName = `QCF2_P${page}`;
        const fontUrl = `https://quran.com/fonts/quran/hafs/v2/woff2/p${page}.woff2`;
        
        const font = new FontFace(fontName, `url(${fontUrl})`);
        font.load().then((loadedFont) => {
          document.fonts.add(loadedFont);
        }).catch(err => console.log("Font load error: ", err));
      }, [page]);

      // معالجة السحب (Swipe)
      const handleTouchStart = (e) => { touchStartX.current = e.targetTouches[0].clientX; };
      const handleTouchMove = (e) => { touchEndX.current = e.targetTouches[0].clientX; };
      const handleTouchEnd = () => {
        const dist = touchStartX.current - touchEndX.current;
        if (Math.abs(dist) > 50 && touchEndX.current !== 0) {
          if (dist > 0 && page < TOTAL_PAGES) setPage(p => p + 1);
          if (dist < 0 && page > 1) setPage(p => p - 1);
        }
        touchStartX.current = 0;
        touchEndX.current = 0;
      };

      // تجميع الكلمات حسب الأسطر الـ 15 للمصحف
      const renderLines = () => {
        const lines = {};
        words.forEach(w => {
          if (!lines[w.lineNumber]) lines[w.lineNumber] = [];
          lines[w.lineNumber].push(w);
        });

        return Object.keys(lines).map(lineNum => (
          <div key={lineNum} className="w-full flex justify-between items-center my-1 px-2">
            {lines[lineNum].map((w) => {
              const isSelected = selectedAyahKey === w.ayahKey;
              return (
                <span
                  key={w.id}
                  onClick={() => setSelectedAyahKey(isSelected ? null : w.ayahKey)}
                  className={`inline-block transition-all duration-150 cursor-pointer ${isSelected ? 'word-active' : ''}`}
                  style={{ fontFamily: `QCF2_P${page}` }}
                >
                  {w.code}
                </span>
              );
            })}
          </div>
        ));
      };

      return (
        <div className={`flex flex-col h-screen w-full ${night ? 'bg-[#0b1411] text-[#E9E0CC]' : 'bg-[#FBF5E6] text-[#241C12]'}`}>
          
          {/* الهيدر العلوي */}
          <header className={`w-full py-2.5 px-4 flex items-center justify-between border-b ${night ? 'bg-[#121f1a] border-emerald-900/50' : 'bg-[#123328] text-white'}`}>
            <button 
              onClick={() => setNight(!night)} 
              className="text-xs px-3 py-1 rounded-full bg-emerald-900/40 border border-amber-500/30 text-amber-300"
            >
              {night ? "☀️ نهار" : "🌙 ليل"}
            </button>
            <div className="text-center">
              <div className="text-sm font-bold text-amber-300">{meta.surahName}</div>
              <div className="text-[10px] opacity-75">الجزء {toArabicNumber(meta.juz)}</div>
            </div>
            <div className="text-xs font-bold text-amber-300 bg-emerald-950/60 px-2.5 py-1 rounded border border-amber-500/20">
              {toArabicNumber(page)} / {toArabicNumber(TOTAL_PAGES)}
            </div>
          </header>

          {/* لوحة المصحف المتجهية القابلة للتكبير التام */}
          <main 
            className="flex-1 flex items-center justify-center p-2 sm:p-6 overflow-hidden relative"
            onTouchStart={handleTouchStart}
            onTouchMove={handleTouchMove}
            onTouchEnd={handleTouchEnd}
          >
            <div className={`w-full max-w-[580px] p-4 sm:p-8 rounded-2xl border-2 shadow-2xl relative ${night ? 'bg-[#121f1a] border-[#8A6B2E]/40' : 'bg-[#FFFDF7] border-[#B8862F]'}`}>
              
              {loading ? (
                <div className="py-40 text-center text-amber-400 font-semibold text-sm animate-pulse">
                  جاري تحميل رموز QCF V2 المتجهية...
                </div>
              ) : (
                <div className="qcf-v2-text text-2xl sm:text-3xl w-full">
                  {renderLines()}
                </div>
              )}

              {/* رقم الصفحة السفلي */}
              <div className="text-center mt-4 text-xs font-bold opacity-50 border-t border-amber-500/20 pt-2">
                {toArabicNumber(page)}
              </div>
            </div>
          </main>

          {/* شريط خيارات الآية عند تحديدها */}
          {selectedAyahKey && (
            <div className="fixed bottom-4 inset-x-4 max-w-md mx-auto bg-[#121f1a] border border-amber-500/40 rounded-2xl p-4 text-center shadow-2xl z-50">
              <div className="text-xs font-bold text-amber-300 mb-2">الآية المحددة: {selectedAyahKey}</div>
              <div className="flex gap-2 justify-center">
                <button onClick={() => alert(`تلاوة ${selectedAyahKey}`)} className="px-3 py-1.5 bg-emerald-900/60 text-amber-200 rounded-lg text-xs font-semibold">▶ استماع</button>
                <button onClick={() => alert(`تفسير ${selectedAyahKey}`)} className="px-3 py-1.5 bg-emerald-900/60 text-amber-200 rounded-lg text-xs font-semibold">📖 تفسير</button>
                <button onClick={() => setSelectedAyahKey(null)} className="px-3 py-1.5 bg-red-900/40 text-red-300 rounded-lg text-xs">إلغاء</button>
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
