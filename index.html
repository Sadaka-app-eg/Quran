<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>تطبيق أثر - المصحف الشريف QCF V2</title>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Compiler -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Reem+Kufi:wght@600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background-color: #0b1411;
      color: #e2e8f0;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
      touch-action: manipulation;
      margin: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* إطار بنسبة المصحف الحقيقية (0.69) */
    .mushaf-frame-container {
      aspect-ratio: 0.69;
      height: min(90vh, 880px);
      width: auto;
      max-width: 95vw;
      position: relative;
      border-radius: 26px;
      overflow: hidden;
      border: 1px solid #8a6b2d;
      box-shadow: inset 0 0 35px rgba(212, 175, 55, 0.08), 0 10px 40px rgba(0, 0, 0, 0.45);
    }

    /* شبكة الـ 15 سطرًا الثابتة (CSS Grid) */
    .qcf-page-grid {
      display: grid;
      grid-template-rows: repeat(15, 1fr);
      height: 100%;
      width: 100%;
      gap: 0;
    }

    /* محرك تباعد السطر لمطابقة مصحف المدينة */
    .quran-line {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      width: 100%;
      direction: rtl;
      height: 52px;
      text-align: justify;
      text-justify: inter-word;
    }

    .quran-line::after {
      content: "";
      flex: 1;
    }

    /* الكلمة وضبط الاتصال العثماني */
    .quran-word {
      padding: 0;
      margin: 0;
      white-space: nowrap;
      flex-shrink: 0;
      transition: transform 0.18s, background 0.18s, color 0.18s;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      font-feature-settings: "liga", "calt", "kern";
      font-variant-ligatures: contextual;
      font-kerning: normal;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.18);
      touch-action: manipulation;
    }

    .quran-word:active {
      transform: scale(0.95);
    }

    /* تحديد السطر والآية بنمط أنيق */
    .quran-word-selected {
      background: linear-gradient(90deg, #b8862f44, #d4af3744);
      box-shadow: 0 0 12px #d4af3740;
      border-radius: 5px;
      color: #fce788 !important;
    }

    .quran-line:has(.quran-word-selected) {
      background: rgba(212, 175, 55, 0.05);
      border-radius: 8px;
    }

    /* تمييز الكلمة أثناء التلاوة */
    .audio-active {
      color: #FFD54F !important;
      text-shadow: 0 0 8px #FFD54F, 0 0 16px #FFD54F;
      transition: 0.12s;
    }

    /* دائرة رقم الآية العثماني */
    .ayah-number {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 22px;
      height: 22px;
      margin-inline: 4px;
      border: 1px solid #b9953c;
      border-radius: 50%;
      font-size: 11px;
      color: #b9953c;
      font-family: 'Cairo', sans-serif;
      font-weight: bold;
    }

    /* حركة تقليب ثلاثية الأبعاد بـ GPU */
    .page-fade-inner {
      animation: page3d 0.25s cubic-bezier(0.2, 0, 0.2, 1);
      will-change: transform, opacity;
      backface-visibility: hidden;
      height: 100%;
    }

    @keyframes page3d {
      from {
        opacity: 0;
        transform: translate3d(20px, 0, 0);
      }
      to {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }
    }

    /* Skeleton Loading */
    .skeleton-line {
      height: 38px;
      background: rgba(184, 134, 47, 0.15);
      border-radius: 6px;
      margin-block: 4px;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    .bottom-sheet-anim {
      animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-[#0b1411]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ==========================================
    // 1. DATA & CONSTANTS
    // ==========================================
    const TOTAL_PAGES = 604;

    const RAW_SURAHS = [
      "الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس",
      "هود", "يوسف", "الرعد", "إبراهيم", "الحجر", "النحل", "الإسراء", "الكهف", "مريم", "طه",
      "الأنبياء", "الحج", "المؤمنون", "النور", "الفرقان", "الشعراء", "النمل", "القصص", "العنكبوت", "الروم",
      "لقمان", "السجدة", "الأحزاب", "سبأ", "فاطر", "يس", "الصافات", "ص", "الزمر", "غافر",
      "فصلت", "الشورى", "الزخرف", "الدخان", "الجاثية", "الأحقاف", "محمد", "الفتح", "الحجرات", "ق",
      "الذاريات", "الطور", "النجم", "القمر", "الرحمن", "الواقعة", "الحديد", "المجادلة", "الحشر", "الممتحنة",
      "الصف", "الجمعة", "المنافقون", "التغابن", "الطلاق", "التحريم", "الملك", "القلم", "الحاقة", "المعارج",
      "نوح", "الجن", "المزمل", "المدثر", "القيامة", "الإنسان", "المرسلات", "النبأ", "النازعات", "عبس",
      "التكوير", "الإنفطار", "المطففين", "الإنشقاق", "البروج", "الطارق", "الأعلى", "الغاشية", "الفجر", "البلد",
      "الشمس", "الليل", "الضحى", "الشرح", "التين", "العلق", "القدر", "البينة", "الزلزلة", "العاديات",
      "القارعة", "التكاثر", "العصر", "الهمزة", "الفيل", "قريش", "المعون", "الكوثر", "الكافرون", "النصر",
      "المسد", "الإخلاص", "الفلق", "الناس"
    ];

    const SURAHS = RAW_SURAHS.map((name, index) => ({ id: index + 1, name }));

    function getSurahName(id) {
      const s = SURAHS.find(item => item.id === id);
      return s ? s.name : `سورة ${id}`;
    }

    // ==========================================
    // 2. UTILS & CACHE (utils.js & fontLoader.js)
    // ==========================================
    const PAGE_CACHE = new Map();

    function savePage(page, data) {
      PAGE_CACHE.set(page, data);
      if (PAGE_CACHE.size > 15) {
        const firstKey = PAGE_CACHE.keys().next().value;
        PAGE_CACHE.delete(firstKey);
      }
    }

    function loadPage(page) {
      return PAGE_CACHE.get(page);
    }

    function hasPage(page) {
      return PAGE_CACHE.has(page);
    }

    const numeralsAr = ["٠","١","٢","٣","٤","٥","٦","٧","٨","٩"];
    function toArabicNumber(n) {
      return String(n).split("").map(d => numeralsAr[+d] ?? d).join("");
    }

    const loadedFonts = new Set();
    async function loadFont(page) {
      const name = `QCF_V2_P${page}`;
      if (loadedFonts.has(name) || document.fonts.check(`16px ${name}`)) {
        loadedFonts.add(name);
        return true;
      }
      const url = `https://verses.quran.foundation/fonts/quran/hafs/v2/woff2/p${page}.woff2`;
      try {
        const font = new FontFace(name, `url(${url})`);
        await font.load();
        document.fonts.add(font);
        await document.fonts.ready;
        loadedFonts.add(name);
        return true;
      } catch (e) {
        console.error("Font error:", e);
        return false;
      }
    }

    // ==========================================
    // 3. LAYOUT ENGINE (layout.js)
    // ==========================================
    function buildPage(words) {
      const lines = {};
      for (let i = 1; i <= 15; i++) {
        lines[i] = words.filter(w => w.lineNumber === i);
      }
      return lines;
    }

    // ==========================================
    // 4. MUSHAF COMPONENT (Mushaf.jsx)
    // ==========================================
    const AyahWord = React.memo(({ word, page, isSelected, onClick }) => {
      return (
        <span
          onClick={() => onClick(word)}
          className={`quran-word ${isSelected ? 'quran-word-selected' : ''}`}
          style={{ fontFamily: `QCF_V2_P${page}` }}
        >
          {word.code}
          {word.charType === "end" && (
            <span className="ayah-number">
              {toArabicNumber(word.ayahKey.split(':')[1])}
            </span>
          )}
        </span>
      );
    });

    function Mushaf({ page, words, groupedLines, loading, selectedAyahKey, onWordClick, night }) {
      const pageFontSize = useMemo(() => {
        return page <= 2 ? 42 : page <= 10 ? 39 : 35;
      }, [page]);

      const linesData = useMemo(() => groupedLines, [groupedLines]);

      return (
        <div className={`mushaf-frame-container ${night ? 'bg-[#121f1a]' : 'bg-[#FFFDF7]'}`}>
          <div className="absolute inset-0 bg-cover opacity-[0.04] pointer-events-none" style={{ backgroundImage: `url('https://images.unsplash.com/photo-1519751138087-5bf79df62d5b?q=80&w=1200')` }}></div>
          <div className="absolute inset-3 rounded-[20px] border-[4px] border-[#8b6d2d]/30 pointer-events-none"></div>
          <div className="absolute inset-5 rounded-[16px] border border-[#b9953c]/40 pointer-events-none"></div>

          <div className="relative h-full px-4 sm:px-8 py-6 flex flex-col justify-between">
            {loading ? (
              <div className="my-auto w-full px-2">
                {Array.from({ length: 15 }).map((_, i) => (
                  <div key={i} className="skeleton-line" style={{ width: `${85 + (i % 3) * 5}%`, marginInline: 'auto' }}></div>
                ))}
              </div>
            ) : (
              <div className="page-fade-inner qcf-page-grid" style={{ fontSize: `${pageFontSize}px` }}>
                {Array.from({ length: 15 }, (_, i) => i + 1).map((lineNum) => {
                  const lineWords = linesData[lineNum] || [];
                  return (
                    <div key={lineNum} className="quran-line">
                      {lineWords.map((word) => (
                        <AyahWord
                          key={word.id}
                          word={word}
                          page={page}
                          isSelected={selectedAyahKey === word.ayahKey}
                          onClick={onWordClick}
                        />
                      ))}
                    </div>
                  );
                })}
              </div>
            )}

            <div className="text-center text-xs font-bold opacity-60 border-t border-amber-500/20 pt-1.5 text-amber-300">
              {toArabicNumber(page)}
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 5. MAIN APP COMPONENT (App.jsx)
    // ==========================================
    function App() {
      const [page, setPage] = useState(1);
      const [night, setNight] = useState(true);
      const [words, setWords] = useState([]);
      const [groupedLines, setGroupedLines] = useState({});
      const [selectedAyahKey, setSelectedAyahKey] = useState(null);
      const [selectedAyahText, setSelectedAyahText] = useState("");
      const [loading, setLoading] = useState(true);
      const [meta, setMeta] = useState({ surahName: "", juz: 1, hizb: 1 });
      const [activeModal, setActiveModal] = useState(null);
      
      const [changingPage, setChangingPage] = useState(false);
      const [showJump, setShowJump] = useState(false);
      const [jumpInput, setJumpInput] = useState("");

      const touchStartX = useRef(0);
      const touchEndX = useRef(0);

      useEffect(() => {
        const lastPage = localStorage.getItem("last_page");
        if (lastPage) setPage(Number(lastPage));
        
        const lastAyah = localStorage.getItem("last_ayah");
        if (lastAyah) setSelectedAyahKey(lastAyah);
      }, []);

      useEffect(() => {
        localStorage.setItem("last_page", page);
        if (selectedAyahKey) {
          localStorage.setItem("last_ayah", selectedAyahKey);
        }
      }, [page, selectedAyahKey]);

      const handlePageChange = useCallback((newPage) => {
        if (changingPage || newPage < 1 || newPage > TOTAL_PAGES) return;
        setChangingPage(true);
        if (navigator.vibrate) navigator.vibrate(20);
        setPage(newPage);
        setTimeout(() => setChangingPage(false), 250);
      }, [changingPage]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === "ArrowLeft") handlePageChange(page + 1);
          if (e.key === "ArrowRight") handlePageChange(page - 1);
        };
        window.addEventListener("keydown", handleKeyDown);
        return () => window.removeEventListener("keydown", handleKeyDown);
      }, [page, handlePageChange]);

      const fetchPageData = useCallback(async (p, isPreload = false) => {
        if (!isPreload) setLoading(true);

        if (hasPage(p)) {
          const cached = loadPage(p);
          if (!isPreload) {
            setWords(cached.words);
            setGroupedLines(cached.groupedLines);
            setMeta(cached.meta);
            setLoading(false);
          }
          return;
        }

        try {
          await loadFont(p);
          const res = await fetch(`https://api.quran.com/api/v4/verses/by_page/${p}?words=true&word_fields=code_v2,line_number,text_uthmani,char_type_name&fields=chapter_id,juz_number,hizb_number`);
          const json = await res.json();

          if (json.verses && json.verses.length > 0) {
            const pageWords = [];
            json.verses.forEach(v => {
              v.words.forEach(w => {
                pageWords.push({
                  id: w.id,
                  code: w.code_v2,
                  lineNumber: w.line_number,
                  ayahKey: v.verse_key,
                  charType: w.char_type_name,
                  text: w.text_uthmani
                });
              });
            });

            const lines = buildPage(pageWords);
            const first = json.verses[0];
            const surahName = getSurahName(first.chapter_id);

            const pageMeta = {
              surahName,
              juz: first.juz_number,
              hizb: first.hizb_number
            };

            savePage(p, {
              words: pageWords,
              groupedLines: lines,
              meta: pageMeta
            });

            if (!isPreload) {
              setWords(pageWords);
              setGroupedLines(lines);
              setMeta(pageMeta);
              setLoading(false);
            }
          }
        } catch (e) {
          console.error("Fetch error:", e);
          if (!isPreload) setLoading(false);
        }
      }, []);

      useEffect(() => {
        fetchPageData(page);

        // Preload 4 مجاورة
        const neighbors = [page - 2, page - 1, page + 1, page + 2];
        neighbors.forEach(p => {
          if (p >= 1 && p <= TOTAL_PAGES && !hasPage(p)) {
            fetchPageData(p, true);
          }
        });
      }, [page, fetchPageData]);

      const handleTouchStart = (e) => { touchStartX.current = e.targetTouches[0].clientX; };
      const handleTouchMove = (e) => { touchEndX.current = e.targetTouches[0].clientX; };
      const handleTouchEnd = () => {
        const dist = touchStartX.current - touchEndX.current;
        if (Math.abs(dist) > 45 && touchEndX.current !== 0) {
          if (dist > 0) handlePageChange(page + 1);
          else handlePageChange(page - 1);
        }
        touchStartX.current = 0;
        touchEndX.current = 0;
      };

      const handleWordClick = useCallback((word) => {
        if (selectedAyahKey === word.ayahKey) {
          setSelectedAyahKey(null);
          setActiveModal(null);
        } else {
          setSelectedAyahKey(word.ayahKey);
          const text = words.filter(w => w.ayahKey === word.ayahKey).map(w => w.text).join(" ");
          setSelectedAyahText(text);
          setActiveModal('menu');
        }
      }, [selectedAyahKey, words]);

      return (
        <div className={`flex flex-col h-screen w-full ${night ? 'bg-[#0b1411] text-[#E9E0CC]' : 'bg-[#EFE7D3] text-[#241C12]'} transition-colors duration-300`}>
          
          <header className={`w-full py-2 px-4 flex items-center justify-between border-b shadow-md ${night ? 'bg-[#121f1a] border-emerald-900/40 text-amber-100' : 'bg-[#123328] text-white'}`}>
            <button 
              onClick={() => setNight(!night)} 
              className="text-xs px-3 py-1.5 rounded-full bg-emerald-900/40 border border-amber-500/30 text-amber-300 active:scale-95 transition"
            >
              {night ? "☀️ نهار" : "🌙 ليل"}
            </button>

            <div className="text-center">
              <div className="text-base font-bold text-amber-300">{meta.surahName || "المصحف الشريف"}</div>
              <div className="text-[11px] opacity-80 text-emerald-400">
                الجزء {toArabicNumber(meta.juz)} &nbsp;|&nbsp; الحزب {toArabicNumber(meta.hizb)}
              </div>
            </div>

            <div className="text-xs font-bold text-amber-300 bg-emerald-950/70 px-3 py-1 rounded-md border border-amber-500/20">
              {toArabicNumber(page)} / {toArabicNumber(TOTAL_PAGES)}
            </div>
          </header>

          <main 
            className="flex-1 flex items-center justify-center p-2 sm:p-4 overflow-hidden relative"
            onTouchStart={handleTouchStart}
            onTouchMove={handleTouchMove}
            onTouchEnd={handleTouchEnd}
          >
            <Mushaf 
              page={page}
              words={words}
              groupedLines={groupedLines}
              loading={loading}
              selectedAyahKey={selectedAyahKey}
              onWordClick={handleWordClick}
              night={night}
            />
          </main>

          {/* زر الانتقال السريع العائم */}
          <button
            className="fixed bottom-6 right-6 w-12 h-12 rounded-full bg-amber-600/90 hover:bg-amber-600 text-white shadow-xl flex items-center justify-center text-lg z-30 transition active:scale-90"
            onClick={() => setShowJump(true)}
          >
            📖
          </button>

          {/* نافذة الانتقال السريع */}
          {showJump && (
            <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-xs flex items-center justify-center p-4" onClick={() => setShowJump(false)}>
              <div onClick={e => e.stopPropagation()} className="bg-[#121f1a] border border-amber-500/40 w-full max-w-xs rounded-2xl p-5 text-amber-100 text-center">
                <h3 className="text-sm font-bold text-amber-300 mb-3">الانتقال إلى صفحة</h3>
                <input 
                  type="number"
                  value={jumpInput}
                  onChange={e => setJumpInput(e.target.value)}
                  placeholder={`1 - ${TOTAL_PAGES}`}
                  className="w-full text-center py-2 bg-emerald-950/60 border border-emerald-700/40 rounded-xl text-amber-200 outline-none mb-4"
                />
                <div className="flex gap-2">
                  <button 
                    onClick={() => {
                      const p = parseInt(jumpInput, 10);
                      if (p >= 1 && p <= TOTAL_PAGES) {
                        handlePageChange(p);
                        setShowJump(false);
                        setJumpInput("");
                      }
                    }}
                    className="flex-1 py-2 bg-amber-600 text-white rounded-xl text-xs font-bold"
                  >
                    انتقال
                  </button>
                  <button onClick={() => setShowJump(false)} className="flex-1 py-2 bg-emerald-900/40 text-amber-200 rounded-xl text-xs">إلغاء</button>
                </div>
              </div>
            </div>
          )}

          {/* Bottom Sheet للخيارات */}
          {selectedAyahKey && activeModal === 'menu' && (
            <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-xs flex items-end justify-center p-0 sm:p-4" onClick={() => { setSelectedAyahKey(null); setActiveModal(null); }}>
              <div onClick={e => e.stopPropagation()} className="bottom-sheet-anim w-full sm:max-w-md bg-[#121f1a] text-amber-100 border-amber-500/30 border-t sm:border rounded-t-2xl sm:rounded-2xl p-5 shadow-2xl">
                <div className="flex items-center justify-between border-b border-amber-500/20 pb-3 mb-4">
                  <span className="text-sm font-bold text-amber-300">
                    الآية ({toArabicNumber(selectedAyahKey.split(':')[1])}) - {meta.surahName}
                  </span>
                  <button onClick={() => { setSelectedAyahKey(null); setActiveModal(null); }} className="text-xs bg-amber-500/20 px-2.5 py-1 rounded-full text-amber-300">✕</button>
                </div>

                <div className="grid grid-cols-2 gap-2.5 text-xs font-semibold">
                  <button onClick={() => navigator.share ? navigator.share({ text: selectedAyahText }) : navigator.clipboard.writeText(selectedAyahText)} className="p-3 rounded-xl bg-emerald-900/30 border border-emerald-700/30 text-amber-200">
                    📤 مشاركة / نسخ
                  </button>
                  <button onClick={() => setSelectedAyahKey(null)} className="p-3 rounded-xl bg-emerald-900/30 border border-emerald-700/30 text-amber-200">
                    إلغاء التحديد
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
