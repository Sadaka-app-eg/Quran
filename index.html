<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>مصحف وحي - Wahei Quran</title>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
    
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background-color: #0b1411;
      color: #e2e8f0;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
      margin: 0;
      padding: 0;
      touch-action: pan-y;
    }

    /* حاوي الصفحة لملء الشاشة بالكامل دون مربعات داخلية ضيقة */
    .quran-view {
      height: calc(100vh - 54px);
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background-color: #0b1411;
    }

    /* ضبط عرض وتجاوب الصفحة العثمانية المصورة/SVG */
    .quran-svg-page {
      height: 100%;
      width: 100%;
      max-width: 600px;
      object-fit: contain;
      transition: filter 0.3s ease;
    }

    /* الوضع الليلي المطابق لتطبيق وحي بالضبط */
    .night-filter {
      filter: invert(0.92) hue-rotate(180deg) brightness(1.02) contrast(1.15);
    }

    /* تأثير الانزلاق السلس للخيارات */
    .bottom-sheet {
      animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-[#0b1411]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const TOTAL_PAGES = 604;

    const numeralsAr = ["٠","١","٢","٣","٤","٥","٦","٧","٨","٩"];
    function toArabicNumber(n) {
      return String(n).split("").map(d => numeralsAr[+d] ?? d).join("");
    }

    function App() {
      const [page, setPage] = useState(1);
      const [pageMeta, setPageMeta] = useState({ surahName: "سُورَةُ الفَاتِحَة", juzName: "الجزء الأول" });
      const [night, setNight] = useState(true);
      const [loading, setLoading] = useState(false);
      const [showMenu, setShowMenu] = useState(false);
      const [activeAction, setActiveAction] = useState(null);

      const touchStartX = useRef(0);
      const touchEndX = useRef(0);
      const longPressTimer = useRef(null);

      // جلب بيانات الصفحة (اسم السورة والجزء)
      const fetchPageDetails = useCallback(async (pageNum) => {
        setLoading(true);
        try {
          const res = await fetch(`https://api.alquran.cloud/v1/page/${pageNum}/quran-uthmani`);
          const json = await res.json();
          if (json.data && json.data.ayahs.length > 0) {
            const firstAyah = json.data.ayahs[0];
            setPageMeta({
              surahName: firstAyah.surah.name,
              juzName: `الجزء ${toArabicNumber(firstAyah.juz)}`
            });
          }
        } catch (e) {
          console.error(e);
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => {
        fetchPageDetails(page);
      }, [page, fetchPageDetails]);

      const changePage = (delta) => {
        const newPage = page + delta;
        if (newPage >= 1 && newPage <= TOTAL_PAGES) {
          setPage(newPage);
          setShowMenu(false);
        }
      };

      // أحداث اللمس والسحب (Swipe & Long Press)
      const handleTouchStart = (e) => {
        touchStartX.current = e.targetTouches[0].clientX;
        // مؤقت الضغط المطول
        longPressTimer.current = setTimeout(() => {
          setShowMenu(true);
        }, 500);
      };

      const handleTouchMove = (e) => {
        touchEndX.current = e.targetTouches[0].clientX;
        if (longPressTimer.current) {
          clearTimeout(longPressTimer.current);
        }
      };

      const handleTouchEnd = () => {
        if (longPressTimer.current) {
          clearTimeout(longPressTimer.current);
        }
        
        const distance = touchStartX.current - touchEndX.current;
        const minSwipeDistance = 45;

        if (Math.abs(distance) > minSwipeDistance && touchEndX.current !== 0) {
          if (distance > 0) {
            changePage(1);  // سحب لليسار -> الصفحة التالية
          } else {
            changePage(-1); // سحب لليمين -> الصفحة السابقة
          }
        }
        touchStartX.current = 0;
        touchEndX.current = 0;
      };

      // مصدر متجه الصفحة المتوافق مع مصحف المدينة الرسمي
      const getPageSvgUrl = (p) => {
        return `https://quran.ksu.edu.eg/png_big/${p}.png`;
      };

      return (
        <div className="flex flex-col h-screen w-full bg-[#0b1411] select-none overflow-hidden">
          
          {/* 1. الهيدر العلوي الاحترافي الشبيه بوحي */}
          <header className="w-full bg-[#121f1a] text-amber-100 py-2 px-4 shadow-lg flex items-center justify-between border-b border-emerald-900/40 z-20 h-[54px]">
            <button 
              onClick={() => setNight(!night)}
              className="p-1.5 px-3 rounded-full bg-emerald-900/30 text-amber-300 text-xs flex items-center gap-1 border border-amber-500/20 active:scale-95 transition"
            >
              {night ? "☀️ نهار" : "🌙 ليل"}
            </button>

            <div className="text-center">
              <div className="text-sm font-bold text-amber-200">{pageMeta.surahName}</div>
              <div className="text-[10px] text-emerald-400">{pageMeta.juzName}</div>
            </div>

            <div className="text-xs bg-emerald-950/80 px-3 py-1 rounded-md border border-emerald-700/40 text-amber-300 font-bold">
              {toArabicNumber(page)} / {toArabicNumber(TOTAL_PAGES)}
            </div>
          </header>

          {/* 2. منطقة عرض الصفحة الشاملة والمتجاوبة */}
          <main 
            className="quran-view"
            onTouchStart={handleTouchStart}
            onTouchMove={handleTouchMove}
            onTouchEnd={handleTouchEnd}
            onClick={() => setShowMenu(!showMenu)}
          >
            {loading && (
              <div className="absolute inset-0 flex items-center justify-center bg-[#0b1411]/90 z-10">
                <div className="flex flex-col items-center gap-2">
                  <div className="w-8 h-8 border-2 border-amber-400 border-t-transparent rounded-full animate-spin"></div>
                  <span className="text-xs text-amber-300">جاري تحميل المصحف...</span>
                </div>
              </div>
            )}

            <img
              src={getPageSvgUrl(page)}
              alt={`الصفحة ${page}`}
              className={`quran-svg-page ${night ? 'night-filter' : ''}`}
            />
          </main>

          {/* 3. قائمة الخيارات السفلية عند النقر/الضغط المطول (Action Sheet) */}
          {showMenu && (
            <div 
              className="fixed inset-0 bg-black/60 backdrop-blur-xs flex items-end justify-center z-50 p-0 sm:p-4"
              onClick={() => setShowMenu(false)}
            >
              <div 
                onClick={(e) => e.stopPropagation()}
                className="bottom-sheet bg-[#121f1a] border-t sm:border border-amber-500/30 w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl p-5 text-amber-100 shadow-2xl"
              >
                <div className="flex items-center justify-between border-b border-emerald-800/50 pb-3 mb-4">
                  <span className="text-sm font-bold text-amber-300">
                    خيارات الصفحة ({toArabicNumber(page)}) - {pageMeta.surahName}
                  </span>
                  <button onClick={() => setShowMenu(false)} className="text-xs bg-emerald-900/50 px-2 py-1 rounded">✕</button>
                </div>

                <div className="grid grid-cols-2 gap-3">
                  <button 
                    onClick={() => { alert(`جاري تشغيل تلاوة الصفحة ${page}`); setShowMenu(false); }}
                    className="flex items-center justify-center gap-2 py-3 bg-emerald-900/40 hover:bg-emerald-800/60 rounded-xl text-xs font-semibold border border-emerald-700/40 text-amber-200 active:scale-95 transition"
                  >
                    <span>▶ تشغيل التلاوة</span>
                  </button>

                  <button 
                    onClick={() => { alert(`تم حفظ العلامة المرجعية في الصفحة ${page}`); setShowMenu(false); }}
                    className="flex items-center justify-center gap-2 py-3 bg-emerald-900/40 hover:bg-emerald-800/60 rounded-xl text-xs font-semibold border border-emerald-700/40 text-amber-200 active:scale-95 transition"
                  >
                    <span>🔖 حفظ علامة</span>
                  </button>

                  <button 
                    onClick={() => { alert(`التفسير الميسر للصفحة ${page}`); setShowMenu(false); }}
                    className="flex items-center justify-center gap-2 py-3 bg-emerald-900/40 hover:bg-emerald-800/60 rounded-xl text-xs font-semibold border border-emerald-700/40 text-amber-200 active:scale-95 transition"
                  >
                    <span>📖 التفسير الميسر</span>
                  </button>

                  <button 
                    onClick={() => { navigator.clipboard.writeText(`مصحف وحي - الصفحة ${page}`); alert("تم نسخ رابط الصفحة"); setShowMenu(false); }}
                    className="flex items-center justify-center gap-2 py-3 bg-emerald-900/40 hover:bg-emerald-800/60 rounded-xl text-xs font-semibold border border-emerald-700/40 text-amber-200 active:scale-95 transition"
                  >
                    <span>📋 مشاركة الصفحة</span>
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
