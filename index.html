<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المصحف التفاعلي - أثر</title>
    <style>
        :root {
            --bg-color: #0c120c;
            --card-bg: #141e15;
            --gold: #d4af37;
            --text-color: #f1f1f1;
        }

        * {
            box-sizing: border-box;
            touch-action: pan-y; /* تحسين السحب الأفقي */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Amiri', 'Traditional Arabic', sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }

        /* 📌 مؤشر الصفحة السفلي/العلوي الخفيف */
        .page-badge {
            background: var(--card-bg);
            color: var(--gold);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
        }

        /* 📖 إطار المصحف التفاعلي */
        .mushaf-wrapper {
            position: relative;
            width: 100%;
            max-width: 480px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            background: #fff;
            transition: transform 0.2s ease-out;
        }

        .mushaf-img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
        }

        .interactive-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* تظليل الآية */
        .ayah-shape {
            fill: transparent;
            cursor: pointer;
            transition: fill 0.2s;
        }
        .ayah-shape:active, .ayah-shape.active {
            fill: rgba(212, 175, 55, 0.4);
        }

        /* 📲 النافذة السفلية للخيارات (Bottom Sheet) */
        .bottom-modal {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 2px solid var(--gold);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
            transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            max-width: 500px;
            margin: 0 auto;
        }

        .bottom-modal.active {
            bottom: 0;
        }

        .modal-title {
            color: var(--gold);
            margin: 0 0 10px 0;
            font-size: 18px;
        }

        .modal-text {
            color: #fff;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
        }

        .close-btn {
            background: rgba(255, 77, 77, 0.2);
            color: #ff4d4d;
            border-color: #ff4d4d;
        }
    </style>
</head>
<body>

    <div class="page-badge" id="pageBadge">صفحة 3</div>

    <!-- إطار المصحف الرئيسي -->
    <div class="mushaf-wrapper" id="mushafWrapper">
        <img id="mushafImage" class="mushaf-img" src="https://images.quran.com/1024/003.png" alt="صفحة المصحف">
        <svg class="interactive-svg" id="svgOverlay" viewBox="0 0 1024 1704" preserveAspectRatio="none"></svg>
    </div>

    <!-- القائمة السفلية عند اختيار آية -->
    <div class="bottom-modal" id="bottomModal">
        <h3 class="modal-title" id="verseTitle">خيارات الآية</h3>
        <div class="modal-text" id="verseText">اختر الآية للتفاعل معها</div>
        <div class="modal-actions">
            <button class="action-btn" onclick="playAudio()">🎙️ استماع</button>
            <button class="action-btn" onclick="openTafsir()">📖 التفسير</button>
            <button class="action-btn" onclick="copyText()">📋 نسخ</button>
            <button class="action-btn close-btn" onclick="closeModal()">إغلاق</button>
        </div>
    </div>

    <script>
        let currentPage = 3;
        const totalPages = 604;
        let currentAyahData = null;

        const wrapper = document.getElementById('mushafWrapper');
        const img = document.getElementById('mushafImage');
        const pageBadge = document.getElementById('pageBadge');

        // 🎯 تحميل الصورة والإحداثيات
        function loadPage(page) {
            currentPage = page;
            const pageStr = String(currentPage).padStart(3, '0');
            
            // رابط الصور المباشر المضمون والسريع من quran.com
            img.src = `https://images.quran.com/1024/${pageStr}.png`;
            pageBadge.textContent = `صفحة ${currentPage}`;
            closeModal();
            fetchAyahData(currentPage);
        }

        // 👈👉 دعم تقليب الصفحات بالسحب باليد (Swipe Touch Engine)
        let touchStartX = 0;
        let touchEndX = 0;

        wrapper.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        wrapper.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const swipeDistance = touchEndX - touchStartX;
            if (Math.abs(swipeDistance) > 50) { // مسافة السحبة
                if (swipeDistance > 0) {
                    // سحب لليمين -> الصفحة السابقة (لأن المصحف عربي)
                    if (currentPage > 1) loadPage(currentPage - 1);
                } else {
                    // سحب لليسار -> الصفحة التالية
                    if (currentPage < totalPages) loadPage(currentPage + 1);
                }
            }
        }

        // جلب تفاعلات وإحداثيات الآيات للصفحة
        async function fetchAyahData(page) {
            const svg = document.getElementById('svgOverlay');
            svg.innerHTML = '';

            try {
                const res = await fetch(`https://api.quran.com/api/v4/verses/by_page/${page}?words=false&fields=text_uthmani`);
                const data = await res.json();

                if (data && data.verses) {
                    data.verses.forEach((verse, index) => {
                        // إضافة مساحة لمس تفاعلية لكل آية في الصفحة
                        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                        rect.setAttribute('x', '60');
                        rect.setAttribute('y', (180 + index * 95).toString());
                        rect.setAttribute('width', '904');
                        rect.setAttribute('height', '85');
                        rect.setAttribute('class', 'ayah-shape');

                        let timer;
                        rect.addEventListener('touchstart', () => {
                            timer = setTimeout(() => selectAyah(verse), 350);
                        });
                        rect.addEventListener('touchend', () => clearTimeout(timer));
                        rect.addEventListener('mousedown', () => {
                            timer = setTimeout(() => selectAyah(verse), 350);
                        });
                        rect.addEventListener('mouseup', () => clearTimeout(timer));

                        svg.appendChild(rect);
                    });
                }
            } catch (e) {
                console.log("Error loading verse data", e);
            }
        }

        function selectAyah(verse) {
            currentAyahData = verse;
            document.getElementById('verseTitle').textContent = `آية ${verse.verse_key}`;
            document.getElementById('verseText').textContent = verse.text_uthmani || "نص الآية الشريفة";
            document.getElementById('bottomModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('bottomModal').classList.remove('active');
        }

        function playAudio() { alert('🎧 جاري تشغيل الصوت...'); }
        function openTafsir() { alert('📖 جاري تحميل التفسير الميسر...'); }
        function copyText() {
            if (currentAyahData) {
                navigator.clipboard.writeText(currentAyahData.text_uthmani);
                alert('📋 تم نسخ الآية!');
            }
        }

        // التحميل الأولي
        loadPage(currentPage);
    </script>
</body>
</html>
