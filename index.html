<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>المصحف الشريف - Wahei Style</title>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&family=Reem+Kufi:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
      touch-action: pan-y;
    }

    .quran-text {
      font-family: 'Amiri', serif;
      word-spacing: 2px;
      line-height: 2.3;
    }

    .surah-title {
      font-family: 'Reem Kufi', sans-serif;
    }

    /* زخرفة الآيات والتفاعل */
    .ayah-span {
      transition: all 0.2s ease;
      border-radius: 4px;
      padding: 2px 3px;
      cursor: pointer;
      display: inline;
    }

    .ayah-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.85em;
      height: 1.85em;
      border-radius: 50%;
      font-size: 0.65em;
      vertical-align: middle;
      margin: 0 4px;
      font-family: 'Cairo', sans-serif;
      font-weight: bold;
    }

    /* تحسين التمرير لو زاد النص */
    .page-scroll {
      max-height: calc(100vh - 60px);
      overflow-y: auto;
    }
    
    .page-scroll::-webkit-scrollbar {
      width: 4px;
    }
    .page-scroll::-webkit-scrollbar-thumb {
      background: #b8862f;
      border-radius: 4px;
    }
  </style>
</head>
<body class="bg-[#0b1411]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const BISMILLAH = "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ";
    const TOTAL_PAGES = 604;

    const numeralsAr = ["٠","١","٢","٣","٤","٥","٦","٧","٨","٩"];
    function toArabicNumber(n) {
      return String(n).split("").map(d => numeralsAr[+d] ?? d).join("");
    }

    function App() {
      const [page, setPage] = useState(1);
      const [night, setNight] = useState(true);
      const [ayahs, setAyahs] = useState([]);
      const [meta, setMeta] = useState({ juz: null, surahName: "" });
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      
      // التفاعل مع الآية
      const [selectedAyah, setSelectedAyah] = useState(null);
      const [playingId, setPlayingId] = useState(null);
      const [copied, setCopied] = useState(false);
      
      const audioRef = useRef(null);

      // متطلبات السحب بالأصبع (Swipe)
      const touchStartX = useRef(0);
      const touchEndX = useRef(0);

      // جلب بيانات النص العثماني (Tanzil) لكل صفحة
      const fetchPage = useCallback(async (p) => {
        setLoading(true);
        setError(null);
        setSelectedAyah(null);

        try {
          const res = await fetch(`https://api.alquran.cloud/v1/page/${p}/quran-uthmani`);
          const json = await res.json();

          if (json.code === 200 && json.data) {
            const list = json.data.ayahs || [];
            setAyahs(list);
            
            const firstAyah = list[0];
            setMeta({
              juz: firstAyah?.juz,
              surahName: firstAyah?.surah?.name || ""
            });
          } else {
            throw new Error("فشل في تحميل بيانات الصفحة");
          }
        } catch (e) {
          setError("تعذر الاتصال بالخادم، التأكد من الإنترنت.");
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => {
        fetchPage(page);
      }, [page, fetchPage]);

      const changePage = (delta) => {
        const newPage = page + delta;
        if (newPage >= 1 && newPage <= TOTAL_PAGES) {
          setPage(newPage);
        }
      };

      // السحب باليد (Touch Handlers)
      const handleTouchStart = (e) => {
        touchStartX.current = e.targetTouches[0].clientX;
      };

      const handleTouchMove = (e) => {
        touchEndX.current = e.targetTouches[0].clientX;
      };

      const handleTouchEnd = () => {
        const distance = touchStartX.current - touchEndX.current;
        if (Math.abs(distance) > 40) {
          if (distance > 0) changePage(1);  // سحب لليسار -> الصفحة التالية
          else changePage(-1);             // سحب لليمين -> الصفحة السابقة
        }
        touchStartX.current = 0;
        touchEndX.current = 0;
      };

      const togglePlayAudio = (ayah) => {
        if (playingId === ayah.number) {
          audioRef.current?.pause();
          setPlayingId(null);
        } else {
          const audioUrl = `https://cdn.islamic.network/quran/audio/128/ar.alafasy/${ayah.number}.mp3`;
          if (audioRef.current) {
            audioRef.current.src = audioUrl;
            audioRef.current.play().catch(() => {});
            setPlayingId(ayah.number);
          }
        }
      };

      const copyAyahText = (text) => {
        navigator.clipboard?.writeText(text).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      };

      // ألوان الثيم (مقتبسة من تصميم وحي)
      const theme = night ? {
        bg: "bg-[#0b1411]",
        pageBg: "bg-[#121f1a]",
        border: "border-[#8A6B2E]/50",
        text: "text-[#E9E0CC]",
        headerBg: "bg-[#0e1a16]",
        highlight: "bg-[#2a3e35] text-[#F3E9CE]",
        chip: "bg-[#182922]",
        accent: "#C9A227"
      } : {
        bg: "bg-[#EFE7D3]",
        pageBg: "bg-[#FBF5E6]",
        border: "border-[#B8862F]",
        text: "text-[#241C12]",
        headerBg: "bg-[#123328]",
        highlight: "bg-[#F5E6C8] text-[#123328]",
        chip: "bg-[#F1E8D3]",
        accent: "#B8862F"
      };

      return (
        <div className={`flex flex-col h-screen w-full ${theme.bg} select-none overflow-hidden transition-colors duration-300`}>
          <audio ref={audioRef} onEnded={() => setPlayingId(null)} />

          {/* 1. الهيدر العلوي مثل تصميم وحي */}
          <header className={`w-full ${theme.headerBg} text-amber-100 py-2 px-4 shadow-md flex items-center justify-between border-b border-amber-500/20 z-20 h-[50px]`}>
            <button 
              onClick={() => setNight(!night)}
              className="p-1.5 rounded-full bg-emerald-900/30 text-amber-300 text-xs flex items-center gap-1 border border-amber-500/20"
            >
              {night ? "☀️ نهار" : "🌙 ليل"}
            </button>

            <div className="text-center">
              <div className="text-sm font-bold text-amber-200/90">{meta.surahName || "المصحف الشريف"}</div>
              <div className="text-[11px] text-emerald-400/80">{meta.juz ? `الجزء ${toArabicNumber(meta.juz)}` : ""}</div>
            </div>

            <div className="text-xs bg-emerald-900/40 px-3 py-1 rounded-md border border-emerald-700/30 text-amber-300 font-bold">
              {toArabicNumber(page)} / {toArabicNumber(TOTAL_PAGES)}
            </div>
          </header>

          {/* 2. عرض النص العثماني التفاعلي مع دعم حركة السحب */}
          <main 
            className="flex-1 w-full flex items-center justify-center p-2 sm:p-4 page-scroll relative"
            onTouchStart={handleTouchStart}
            onTouchMove={handleTouchMove}
            onTouchEnd={handleTouchEnd}
          >
            <div className="w-full max-w-[620px] h-full flex flex-col justify-center">
              
              {loading && (
                <div className="flex flex-col items-center justify-center gap-3 py-32 text-amber-400">
                  <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-amber-400"></div>
                  <span className="text-sm font-semibold">جاري تحميل النص العثماني...</span>
                </div>
              )}

              {error && (
                <div className="flex flex-col items-center gap-4 py-24 text-center">
                  <p className="text-red-400 font-medium">{error}</p>
                  <button 
                    onClick={() => fetchPage(page)}
                    className="px-5 py-2 bg-[#B8862F] text-white rounded-full font-semibold shadow"
                  >
                    إعادة المحاولة
                  </button>
                </div>
              )}

              {!loading && !error && (
                <div className={`relative p-5 sm:p-8 rounded-xl ${theme.pageBg} ${theme.text} shadow-2xl border-2 ${theme.border} my-auto`}>
                  
                  {/* زوايا ديكورية */}
                  <div className="absolute top-2 right-2 w-3 h-3 border-t-2 border-r-2 border-[#B8862F]"></div>
                  <div className="absolute top-2 left-2 w-3 h-3 border-t-2 border-l-2 border-[#B8862F]"></div>
                  <div className="absolute bottom-2 right-2 w-3 h-3 border-b-2 border-r-2 border-[#B8862F]"></div>
                  <div className="absolute bottom-2 left-2 w-3 h-3 border-b-2 border-l-2 border-[#B8862F]"></div>

                  {/* تجميع النص التفاعلي */}
                  {groupBySurah(ayahs).map((group, gIdx) => (
                    <div key={gIdx} className="mb-4">
                      
                      {group.showHeader && (
                        <div className="my-3 py-1.5 px-4 rounded-md border border-[#B8862F]/40 bg-gradient-to-r from-transparent via-[#B8862F]/15 to-transparent text-center">
                          <span className="surah-title text-lg font-bold text-[#B8862F]">
                            {group.surah.name}
                          </span>
                        </div>
                      )}

                      {/* البسملة تظهر فقط إذا كانت السورة تبدأ في هذه الصفحة وليست الفاتحة أو التوبة */}
                      {group.showHeader && group.items[0]?.numberInSurah === 1 && group.surah.number !== 1 && group.surah.number !== 9 && (
                        <div className="quran-text text-center text-base my-2 text-[#B8862F]">
                          {BISMILLAH}
                        </div>
                      )}

                      <div className="quran-text text-justify text-lg sm:text-2xl" dir="rtl">
                        {group.items.map((a) => {
                          const isSelected = selectedAyah?.number === a.number;
                          return (
                            <span
                              key={a.number}
                              onClick={() => setSelectedAyah(isSelected ? null : a)}
                              className={`ayah-span ${isSelected ? theme.highlight : "hover:bg-amber-500/10"}`}
                            >
                              <span>{a.text}</span>
                              <span className="ayah-num border border-[#B8862F]/60 text-[#B8862F]">
                                {toArabicNumber(a.numberInSurah)}
                              </span>
                            </span>
                          );
                        })}
                      </div>
                    </div>
                  ))}

                  <div className="text-center mt-4 text-xs font-bold opacity-60 border-t border-amber-900/10 pt-2">
                    {toArabicNumber(page)}
                  </div>
                </div>
              )}
            </div>
          </main>

          {/* 3. نافذة خيارات الآية التفاعلية عند الضغط عليها */}
          {selectedAyah && (
            <div 
              className="fixed inset-0 z-50 bg-black/50 backdrop-blur-xs flex items-end sm:items-center justify-center p-0 sm:p-4"
              onClick={() => setSelectedAyah(null)}
            >
              <div 
                onClick={(e) => e.stopPropagation()}
                className={`w-full sm:w-96 ${theme.pageBg} ${theme.text} rounded-t-2xl sm:rounded-2xl p-4 shadow-2xl border-t-2 sm:border-2 ${theme.border}`}
              >
                <div className="flex items-center justify-between pb-2 mb-3 border-b border-amber-900/20">
                  <span className="font-bold text-sm text-[#B8862F]">
                    {selectedAyah.surah.name} - الآية ({toArabicNumber(selectedAyah.numberInSurah)})
                  </span>
                  <button onClick={() => setSelectedAyah(null)} className="p-1 text-xs">✕</button>
                </div>

                <div className="flex flex-col gap-2">
                  <button
                    onClick={() => togglePlayAudio(selectedAyah)}
                    className={`flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl ${theme.chip} hover:opacity-90 text-sm font-semibold border border-amber-500/20`}
                  >
                    <span>{playingId === selectedAyah.number ? "⏸ إيقاف التلاوة" : "▶ استماع للآية (العفاسي)"}</span>
                  </button>

                  <button
                    onClick={() => copyAyahText(selectedAyah.text)}
                    className={`flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl ${theme.chip} hover:opacity-90 text-sm font-semibold border border-amber-500/20`}
                  >
                    <span>{copied ? "✓ تم نسخ النص" : "📋 نسخ الآية"}</span>
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    function groupBySurah(ayahs) {
      const groups = [];
      let lastSurahNumber = null;

      ayahs.forEach((a) => {
        if (a.surah.number !== lastSurahNumber) {
          groups.push({
            surah: a.surah,
            showHeader: true,
            items: [a]
          });
          lastSurahNumber = a.surah.number;
        } else {
          groups[groups.length - 1].items.push(a);
        }
      });
      return groups;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
