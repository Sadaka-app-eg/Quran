<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>تطبيق أثر - المصحف الشريف QCF V2</title>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Reem+Kufi:wght@600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background-color: #0b1411;
      color: #e2e8f0;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
      touch-action: pan-y;
      margin: 0;
    }

    /* 6) أنيميشن انتقال الصفحة الناعم والأداء العالي */
    .page-fade {
      animation: fade 0.25s ease-out;
      will-change: transform;
      backface-visibility: hidden;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateX(15px);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }

    /* تنسيق أسطر المصحف الـ 15 */
    .qcf-page-container {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
      width: 100%;
    }

    .quran-line {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: nowrap;
      min-height: 48px;
      letter-spacing: 0;
      word-spacing: 0;
    }

    /* 7 & 8) تنسيق الكلمة وظلها والاستجابة عند الضغط */
    .quran-word {
      font-size: 34px;
      line-height: 2.1;
      padding-inline: 1px;
      transition: 0.18s;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.18);
    }

    .quran-word:active {
      transform: scale(0.95);
    }

    /* 5) تحديد الآية بنمط تدرج ذهبي احترافي */
    .quran-word-selected {
      background: linear-gradient(90deg, #b8862f44, #d4af3744);
      box-shadow: 0 0 12px #d4af3740;
      border-radius: 5px;
      color: #fce788 !important;
    }

    /* دائرة رقم الآية العثماني */
    .ayah-number {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 22px;
      height: 22px;
      margin-inline: 4px;
      border: 1px solid #b9953c;
      border-radius: 50%;
      font-size: 11px;
      color: #b9953c;
      font-family: 'Cairo', sans-serif;
      font-weight: bold;
    }

    /* 9) تحسين ظل الإطار الفاخر */
    .mushaf-frame {
      box-shadow: inset 0 0 35px rgba(212, 175, 55, 0.08), 0 10px 40px rgba(0, 0, 0, 0.45);
    }

    /* أنيميشن الـ Bottom Sheet */
    .bottom-sheet-anim {
      animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-[#0b1411]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const TOTAL_PAGES = 604;

    const numeralsAr = ["٠","١","٢","٣","٤","٥","٦","٧","٨","٩"];
    function toArabicNumber(n) {
      return String(n).split("").map(d => numeralsAr[+d] ?? d).join("");
    }

    function App() {
      const [page, setPage] = useState(1);
      const [night, setNight] = useState(true);
      const [words, setWords] = useState([]);
      const [groupedLines, setGroupedLines] = useState({}); // 2) تحسين الأداء عبر تجميع الكلمات
      const [selectedAyahKey, setSelectedAyahKey] = useState(null);
      const [selectedAyahText, setSelectedAyahText] = useState("");
      const [loading, setLoading] = useState(true);
      const [fontLoaded, setFontLoaded] = useState(false);
      const [meta, setMeta] = useState({ surahName: "", juz: 1, hizb: 1 });
      const [activeModal, setActiveModal] = useState(null);

      const touchStartX = useRef(0);
      const touchEndX = useRef(0);

      // استرجاع آخر صفحة عند فتح التطبيق
      useEffect(() => {
        const last = localStorage.getItem("last_page");
        if (last) {
          setPage(Number(last));
        }
      }, []);

      // حفظ الصفحة الحالية
      useEffect(() => {
        localStorage.setItem("last_page", page);
      }, [page]);

      // تحميل خط الصفحة
      const loadPageFont = useCallback(async (pageNum) => {
        const fontName = `QCF_V2_P${pageNum}`;
        const fontUrl = `https://verses.quran.foundation/fonts/quran/hafs/v2/woff2/p${pageNum}.woff2`;
        
        try {
          const font = new FontFace(fontName, `url(${fontUrl})`);
          await font.load();
          document.fonts.add(font);
          await document.fonts.ready;
          return true;
        } catch (e) {
          console.error("خطأ في تحميل الخط:", e);
          return false;
        }
      }, []);

      // جلب بيانات الصفحة بذكاء
      const fetchPageData = useCallback(async (p) => {
        setLoading(true);
        setFontLoaded(false);
        setSelectedAyahKey(null);

        // 4) التحقق من وجود الصفحة في الـ Cache أولاً
        const cache = localStorage.getItem("page_" + p);
        if (cache) {
          try {
            const data = JSON.parse(cache);
            await loadPageFont(p);
            setFontLoaded(true);
            setWords(data.words);
            
            // إعادة تجميع الأسطر للأداء
            const grouped = {};
            data.words.forEach(w => {
              (grouped[w.lineNumber] ??= []).push(w);
            });
            setGroupedLines(grouped);

            setMeta(data.meta);
            setLoading(false);

            // تحميل الصفحات المحيطة مسبقًا
            if (p + 1 <= TOTAL_PAGES) loadPageFont(p + 1);
            if (p - 1 >= 1) loadPageFont(p - 1);
            return;
          } catch (e) {
            console.error("خطأ في قراءة الـ Cache:", e);
          }
        }

        try {
          await loadPageFont(p);
          setFontLoaded(true);

          // 1) جلب قائمة السور لمطابقة اسم السورة الصحيح
          const surahRes = await fetch("https://api.quran.com/api/v4/chapters");
          const surahJson = await surahRes.json();

          const response = await fetch(
            `https://api.quran.com/api/v4/verses/by_page/${p}?words=true&word_fields=code_v2,line_number,page_number,text_uthmani,char_type_name&fields=chapter_id,juz_number,hizb_number`
          );
          const json = await response.json();

          if (!json.verses || json.verses.length === 0) {
            setLoading(false);
            return;
          }

          const pageWords = [];
          json.verses.forEach((verse) => {
            verse.words.forEach((word) => {
              pageWords.push({
                id: word.id,
                code: word.code_v2,
                lineNumber: word.line_number,
                ayahKey: verse.verse_key,
                charType: word.char_type_name,
                text: word.text_uthmani
              });
            });
          });

          setWords(pageWords);

          // 2) تجميع الكلمات حسب السطر للأداء
          const grouped = {};
          pageWords.forEach(w => {
            (grouped[w.lineNumber] ??= []).push(w);
          });
          setGroupedLines(grouped);

          const first = json.verses[0];
          const chapter = surahJson.chapters.find(c => c.id === first.chapter_id);
          const metaData = {
            surahName: chapter?.name_arabic || "المصحف الشريف",
            juz: first.juz_number,
            hizb: first.hizb_number
          };

          setMeta(metaData);

          // 4) حفظ البيانات في الـ Cache
          localStorage.setItem(
            "page_" + p,
            JSON.stringify({
              words: pageWords,
              meta: metaData
            })
          );

          // 3) تحميل الصفحة القادمة والسابقة مسبقًا
          const next = p + 1;
          if (next <= TOTAL_PAGES) {
            loadPageFont(next);
          }
          const prev = p - 1;
          if (prev >= 1) {
            loadPageFont(prev);
          }

        } catch (e) {
          console.error("فشل جلب بيانات الصفحة:", e);
        } finally {
          setLoading(false);
        }
      }, [loadPageFont]);

      useEffect(() => {
        fetchPageData(page);
      }, [page, fetchPageData]);

      // أحداث اللمس والسحب
      const handleTouchStart = (e) => { touchStartX.current = e.targetTouches[0].clientX; };
      const handleTouchMove = (e) => { touchEndX.current = e.targetTouches[0].clientX; };
      const handleTouchEnd = () => {
        const dist = touchStartX.current - touchEndX.current;
        if (Math.abs(dist) > 45 && touchEndX.current !== 0) {
          if (dist > 0 && page < TOTAL_PAGES) setPage(p => p + 1);
          if (dist < 0 && page > 1) setPage(p => p - 1);
        }
        touchStartX.current = 0;
        touchEndX.current = 0;
      };

      const handleWordClick = (word) => {
        if (selectedAyahKey === word.ayahKey) {
          setSelectedAyahKey(null);
          setActiveModal(null);
        } else {
          setSelectedAyahKey(word.ayahKey);
          const fullText = words.filter(w => w.ayahKey === word.ayahKey).map(w => w.text).join(" ");
          setSelectedAyahText(fullText);
          setActiveModal('menu');
        }
      };

      // 10) دالة المشاركة الاحترافية مع الـ Fallback
      const handleShare = () => {
        if (navigator.share) {
          navigator.share({
            title: `آية من ${meta.surahName}`,
            text: selectedAyahText
          }).catch(() => {});
        } else {
          navigator.clipboard.writeText(selectedAyahText);
          alert("تم نسخ نص الآية بنجاح!");
        }
      };

      const pageLines = Array.from({ length: 15 }, (_, i) => i + 1);

      return (
        <div className={`flex flex-col h-screen w-full ${night ? 'bg-[#0b1411] text-[#E9E0CC]' : 'bg-[#EFE7D3] text-[#241C12]'} transition-colors duration-300`}>
          
          {/* الهيدر العلوي */}
          <header className={`w-full py-2 px-4 flex items-center justify-between border-b shadow-md ${night ? 'bg-[#121f1a] border-emerald-900/40 text-amber-100' : 'bg-[#123328] text-white'}`}>
            <button 
              onClick={() => setNight(!night)} 
              className="text-xs px-3 py-1.5 rounded-full bg-emerald-900/40 border border-amber-500/30 text-amber-300 active:scale-95 transition"
            >
              {night ? "☀️ نهار" : "🌙 ليل"}
            </button>

            <div className="text-center">
              <div className="text-base font-bold text-amber-300">{meta.surahName}</div>
              <div className="text-[11px] opacity-80 text-emerald-400">
                الجزء {toArabicNumber(meta.juz)} &nbsp;|&nbsp; الحزب {toArabicNumber(meta.hizb)}
              </div>
            </div>

            <div className="text-xs font-bold text-amber-300 bg-emerald-950/70 px-3 py-1 rounded-md border border-amber-500/20">
              {toArabicNumber(page)} / {toArabicNumber(TOTAL_PAGES)}
            </div>
          </header>

          {/* منطقة المصحف الإطار والأنيميشن */}
          <main 
            className="flex-1 flex items-center justify-center p-2 sm:p-4 overflow-hidden relative"
            onTouchStart={handleTouchStart}
            onTouchMove={handleTouchMove}
            onTouchEnd={handleTouchEnd}
          >
            {/* 9) إطار المصحف المطور بالظل والتصميم الذهبي */}
            <div className={`mushaf-frame relative w-full max-w-[620px] h-[92vh] rounded-[26px] overflow-hidden border ${night ? 'bg-[#121f1a] border-[#8a6b2d]' : 'bg-[#FFFDF7] border-[#b8862f]'}`}>
              
              <div className="absolute inset-0 bg-cover opacity-[0.04] pointer-events-none" style={{ backgroundImage: `url('https://images.unsplash.com/photo-1519751138087-5bf79df62d5b?q=80&w=1200')` }}></div>
              <div className="absolute inset-3 rounded-[20px] border-[4px] border-[#8b6d2d]/30 pointer-events-none"></div>
              <div className="absolute inset-5 rounded-[16px] border border-[#b9953c]/40 pointer-events-none"></div>

              <div className="relative h-full px-4 sm:px-10 py-6 flex flex-col justify-between">
                
                {(loading || !fontLoaded) ? (
                  <div className="my-auto text-center text-amber-400 font-semibold text-sm animate-pulse flex flex-col items-center gap-2">
                    <div className="w-8 h-8 border-2 border-amber-400 border-t-transparent rounded-full animate-spin"></div>
                    <span>جاري تحميل الصفحة بالرسم العثماني...</span>
                  </div>
                ) : (
                  <div className="qcf-page-container page-fade">
                    {pageLines.map((line) => {
                      /* 2) استخدام groupedLines لتحسين الأداء الفائق */
                      const lineWords = groupedLines[line] || [];
                      return (
                        <div key={line} className="quran-line">
                          {lineWords.map((w) => {
                            const isSelected = selectedAyahKey === w.ayahKey;
                            return (
                              <span
                                key={w.id}
                                onClick={() => handleWordClick(w)}
                                className={`quran-word ${isSelected ? 'quran-word-selected' : ''}`}
                                style={{ fontFamily: `QCF_V2_P${page}` }}
                              >
                                {w.code}
                                {w.charType === "end" && (
                                  <span className="ayah-number">
                                    {toArabicNumber(w.ayahKey.split(':')[1])}
                                  </span>
                                )}
                              </span>
                            );
                          })}
                        </div>
                      );
                    })}
                  </div>
                )}

                <div className="text-center text-xs font-bold opacity-60 border-t border-amber-500/20 pt-2 text-amber-300">
                  {toArabicNumber(page)}
                </div>
              </div>
            </div>
          </main>

          {/* 8 & 10) قائمة الخيارات الشاملة والنسخ والمشاركة */}
          {selectedAyahKey && activeModal === 'menu' && (
            <div 
              className="fixed inset-0 z-50 bg-black/60 backdrop-blur-xs flex items-end justify-center p-0 sm:p-4"
              onClick={() => { setSelectedAyahKey(null); setActiveModal(null); }}
            >
              <div 
                onClick={(e) => e.stopPropagation()}
                className={`bottom-sheet-anim w-full sm:max-w-md ${night ? 'bg-[#121f1a] text-amber-100 border-amber-500/30' : 'bg-[#FFFDF7] text-[#241C12] border-[#b8862f]'} border-t sm:border rounded-t-2xl sm:rounded-2xl p-5 shadow-2xl`}
              >
                <div className="flex items-center justify-between border-b border-amber-500/20 pb-3 mb-4">
                  <span className="text-sm font-bold text-amber-300">
                    الآية ({toArabicNumber(selectedAyahKey.split(':')[1])}) - {meta.surahName}
                  </span>
                  <button onClick={() => { setSelectedAyahKey(null); setActiveModal(null); }} className="text-xs bg-amber-500/20 px-2.5 py-1 rounded-full text-amber-300">✕</button>
                </div>

                <div className="grid grid-cols-2 gap-2.5 text-xs font-semibold">
                  <button 
                    onClick={() => {
                      const audio = new Audio(`https://cdn.islamic.network/quran/audio/128/ar.alafasy/${words.find(w=>w.ayahKey===selectedAyahKey)?.id}.mp3`);
                      audio.play().catch(() => alert("جاري التشغيل..."));
                    }}
                    className="flex items-center gap-2 p-3 rounded-xl bg-emerald-900/30 hover:bg-emerald-800/40 border border-emerald-700/30 text-amber-200"
                  >
                    <span>▶️ استماع للآية</span>
                  </button>

                  <button 
                    onClick={() => setActiveModal('tafsir')}
                    className="flex items-center gap-2 p-3 rounded-xl bg-emerald-900/30 hover:bg-emerald-800/40 border border-emerald-700/30 text-amber-200"
                  >
                    <span>📖 التفسير الميسر</span>
                  </button>

                  <button 
                    onClick={() => setActiveModal('translation')}
                    className="flex items-center gap-2 p-3 rounded-xl bg-emerald-900/30 hover:bg-emerald-800/40 border border-emerald-700/30 text-amber-200"
                  >
                    <span>🌐 الترجمة الإنجليزية</span>
                  </button>

                  {/* 10) استخدام دالة المشاركة والنسخ المحدثة */}
                  <button 
                    onClick={handleShare}
                    className="flex items-center gap-2 p-3 rounded-xl bg-emerald-900/30 hover:bg-emerald-800/40 border border-emerald-700/30 text-amber-200"
                  >
                    <span>📤 مشاركة / نسخ</span>
                  </button>

                  <button 
                    onClick={() => alert(`تم حفظ العلامة المرجعية عند الآية ${selectedAyahKey}`)}
                    className="flex items-center gap-2 p-3 rounded-xl bg-emerald-900/30 hover:bg-emerald-800/40 border border-emerald-700/30 text-amber-200"
                  >
                    <span>⭐ حفظ علامة</span>
                  </button>

                  <button 
                    onClick={() => setActiveModal('note')}
                    className="flex items-center gap-2 p-3 rounded-xl bg-emerald-900/30 hover:bg-emerald-800/40 border border-emerald-700/30 text-amber-200"
                  >
                    <span>📝 إضافة ملاحظة</span>
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* نافذة التفسير */}
          {activeModal === 'tafsir' && (
            <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-xs flex items-end sm:items-center justify-center p-4" onClick={() => setActiveModal('menu')}>
              <div onClick={e => e.stopPropagation()} className="bg-[#121f1a] border border-amber-500/40 w-full max-w-lg rounded-2xl p-5 text-amber-100 max-h-[70vh] overflow-y-auto">
                <h3 className="text-sm font-bold text-amber-300 mb-2">التفسير الميسر للآية {selectedAyahKey}</h3>
                <p className="text-xs leading-relaxed text-emerald-100/90 bg-emerald-950/40 p-3 rounded-xl border border-emerald-800/40">
                  {selectedAyahText}
                </p>
                <div className="mt-3 text-xs opacity-80">جاري تحميل التفسير...</div>
                <button onClick={() => setActiveModal('menu')} className="mt-4 w-full py-2 bg-emerald-900/60 rounded-xl text-xs font-bold">الرجوع للقائمة</button>
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
