<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>تطبيق أثر - المصحف الشريف QCF V2</title>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Reem+Kufi:wght@600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background-color: #0b1411;
      color: #e2e8f0;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
      touch-action: pan-y;
      margin: 0;
    }

    /* 6) أنيميشن انتقال الصفحة الناعم والأداء العالي */
    .page-fade {
      animation: fade 0.25s ease-out;
      will-change: transform;
      backface-visibility: hidden;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateX(15px);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }

    /* تنسيق أسطر المصحف الـ 15 */
    .qcf-page-container {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
      width: 100%;
    }

    .quran-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: nowrap;
      height: 100%;
      max-height: calc((100vh - 160px) / 15);
      letter-spacing: 0;
      word-spacing: 0;
      overflow: hidden;
    }

    /* 7 & 8) تنسيق الكلمة وظلها والاستجابة عند الضغط */
.quran-word {
      font-size: clamp(18px, 4.2vw, 26px);
      line-height: 1;
      padding-inline: 0px;
      transition: 0.18s;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      text-shadow: 0 1px 1px rgba(0,0,0,0.18);
    }

    .quran-word:active {
      transform: scale(0.95);
    }

    /* 5) تحديد الآية بنمط تدرج ذهبي احترافي */
    .quran-word-selected {
      background: linear-gradient(90deg, #b8862f44, #d4af3744);
      box-shadow: 0 0 12px #d4af3740;
      border-radius: 5px;
      color: #fce788 !important;
    }

    /* دائرة رقم الآية العثماني */
    .ayah-number {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 22px;
      height: 22px;
      margin-inline: 4px;
      border: 1px solid #b9953c;
      border-radius: 50%;
      font-size: 11px;
      color: #b9953c;
      font-family: 'Cairo', sans-serif;
      font-weight: bold;
    }

   .mushaf-frame-wahi {
  width: 100%;
  max-width: 520px;
  height: 100vh;
  position: relative;
  border: 1px solid rgba(184, 134, 47, 0.3);
  box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 0, 0, 0.6);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 12px 16px 8px 16px;
  background-color: #0b1411;
}

/* شارة رقم الصفحة المنسقة بنفس شكل وحي */
.wahi-page-badge {
  background: linear-gradient(135deg, #12281e, #0a1712);
  border: 1px solid #3d5e4a;
  box-shadow: inset 0 0 5px rgba(212, 175, 55, 0.3);
  border-radius: 12px;
  padding: 2px 16px;
  color: #e2d1a4;
  font-family: 'Cairo', sans-serif;
  font-weight: bold;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
    /* أنيميشن الـ Bottom Sheet */
    .bottom-sheet-anim {
      animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-[#0b1411]">
  <div id="root"></div>

  <script type="text/babel">
    
    const { useState, useEffect, useRef, useCallback } = React;
    const TOTAL_PAGES = 604;

    const numeralsAr = ["٠","١","٢","٣","٤","٥","٦","٧","٨","٩"];
    function toArabicNumber(n) {
      return String(n).split("").map(d => numeralsAr[+d] ?? d).join("");
    }

    function App() {
      const [showControls, setShowControls] = useState(false); // افتراضياً الشاشة كاملة بدونهما
      const [page, setPage] = useState(1);
      const [night, setNight] = useState(true);
      const [words, setWords] = useState([]);
      const [groupedLines, setGroupedLines] = useState({}); // 2) تحسين الأداء عبر تجميع الكلمات
      const [selectedAyahKey, setSelectedAyahKey] = useState(null);
      const [selectedAyahText, setSelectedAyahText] = useState("");
      const [loading, setLoading] = useState(true);
      const [fontLoaded, setFontLoaded] = useState(false);
      const [meta, setMeta] = useState({ surahName: "", juz: 1, hizb: 1 });
      const [activeModal, setActiveModal] = useState(null);

const [tafsirText, setTafsirText] = useState("");
const [tafsirLoading, setTafsirLoading] = useState(false);
const [repeatCount, setRepeatCount] = useState(1);
const [startAyahKey, setStartAyahKey] = useState(null);
const [endAyahKey, setEndAyahKey] = useState(null);
const [isGeneratingImage, setIsGeneratingImage] = useState(false);
const cardRef = useRef(null);

      
      const touchStartX = useRef(0);
      const touchEndX = useRef(0);

      // استرجاع آخر صفحة عند فتح التطبيق
      useEffect(() => {
        const last = localStorage.getItem("last_page");
        if (last) {
          setPage(Number(last));
        }
      }, []);

      // حفظ الصفحة الحالية
      useEffect(() => {
        localStorage.setItem("last_page", page);
      }, [page]);

      // تحميل خط الصفحة
      const loadPageFont = useCallback(async (pageNum) => {
        const fontName = `QCF_V2_P${pageNum}`;
        const fontUrl = `https://verses.quran.foundation/fonts/quran/hafs/v2/woff2/p${pageNum}.woff2`;
        
        try {
          const font = new FontFace(fontName, `url(${fontUrl})`);
          await font.load();
          document.fonts.add(font);
          await document.fonts.ready;
          return true;
        } catch (e) {
          console.error("خطأ في تحميل الخط:", e);
          return false;
        }
      }, []);

      // جلب بيانات الصفحة بذكاء
      const fetchPageData = useCallback(async (p) => {
        setLoading(true);
        setFontLoaded(false);
        setSelectedAyahKey(null);

        // 4) التحقق من وجود الصفحة في الـ Cache أولاً
        const cache = localStorage.getItem("page_" + p);
        if (cache) {
          try {
            const data = JSON.parse(cache);
            await loadPageFont(p);
            setFontLoaded(true);
            setWords(data.words);
            
            // إعادة تجميع الأسطر للأداء
            const grouped = {};
            data.words.forEach(w => {
              (grouped[w.lineNumber] ??= []).push(w);
            });
            setGroupedLines(grouped);

            setMeta(data.meta);
            setLoading(false);

            // تحميل الصفحات المحيطة مسبقًا
            if (p + 1 <= TOTAL_PAGES) loadPageFont(p + 1);
            if (p - 1 >= 1) loadPageFont(p - 1);
            return;
          } catch (e) {
            console.error("خطأ في قراءة الـ Cache:", e);
          }
        }

        try {
          await loadPageFont(p);
          setFontLoaded(true);

          // 1) جلب قائمة السور لمطابقة اسم السورة الصحيح
          const surahRes = await fetch("https://api.quran.com/api/v4/chapters");
          const surahJson = await surahRes.json();

          const response = await fetch(
            `https://api.quran.com/api/v4/verses/by_page/${p}?words=true&word_fields=code_v2,line_number,page_number,text_uthmani,char_type_name&fields=chapter_id,juz_number,hizb_number`
          );
          const json = await response.json();

          if (!json.verses || json.verses.length === 0) {
            setLoading(false);
            return;
          }

          const pageWords = [];
          json.verses.forEach((verse) => {
            verse.words.forEach((word) => {
              pageWords.push({
                id: word.id,
                code: word.code_v2,
                lineNumber: word.line_number,
                ayahKey: verse.verse_key,
                charType: word.char_type_name,
                text: word.text_uthmani
              });
            });
          });

          setWords(pageWords);

          // 2) تجميع الكلمات حسب السطر للأداء
          const grouped = {};
          pageWords.forEach(w => {
            (grouped[w.lineNumber] ??= []).push(w);
          });
          setGroupedLines(grouped);

          const first = json.verses[0];
          const chapter = surahJson.chapters.find(c => c.id === first.chapter_id);
          const metaData = {
            surahName: chapter?.name_arabic || "المصحف الشريف",
            juz: first.juz_number,
            hizb: first.hizb_number
          };

          setMeta(metaData);

          // 4) حفظ البيانات في الـ Cache
          localStorage.setItem(
            "page_" + p,
            JSON.stringify({
              words: pageWords,
              meta: metaData
            })
          );

          // 3) تحميل الصفحة القادمة والسابقة مسبقًا
          const next = p + 1;
          if (next <= TOTAL_PAGES) {
            loadPageFont(next);
          }
          const prev = p - 1;
          if (prev >= 1) {
            loadPageFont(prev);
          }

        } catch (e) {
          console.error("فشل جلب بيانات الصفحة:", e);
        } finally {
          setLoading(false);
        }
      }, [loadPageFont]);

      useEffect(() => {
        fetchPageData(page);
      }, [page, fetchPageData]);

      // أحداث اللمس والسحب
      const handleTouchStart = (e) => { touchStartX.current = e.targetTouches[0].clientX; };
      const handleTouchMove = (e) => { touchEndX.current = e.targetTouches[0].clientX; };
      const handleTouchEnd = () => {
        const dist = touchStartX.current - touchEndX.current;
        if (Math.abs(dist) > 45 && touchEndX.current !== 0) {
          if (dist > 0 && page < TOTAL_PAGES) setPage(p => p + 1);
          if (dist < 0 && page > 1) setPage(p => p - 1);
        }
        touchStartX.current = 0;
        touchEndX.current = 0;
      };


const longPressTimer = useRef(null);

const handleWordTouchStart = (word, e) => {
  e.stopPropagation();
  longPressTimer.current = setTimeout(() => {
    setSelectedAyahKey(word.ayahKey);
    const fullText = words.filter(w => w.ayahKey === word.ayahKey).map(w => w.text).join(" ");
    setSelectedAyahText(fullText);
    setActiveModal('menu');
    if (navigator.vibrate) navigator.vibrate(40); // اهتزاز بسيط للتأكيد
  }, 500); // 500 مللي ثانية للضغطة المطولة
};

const handleWordTouchEnd = () => {
  if (longPressTimer.current) {
    clearTimeout(longPressTimer.current);
  }
};


      
      const handleWordClick = (word) => {
        if (selectedAyahKey === word.ayahKey) {
          setSelectedAyahKey(null);
          setActiveModal(null);
        } else {
          setSelectedAyahKey(word.ayahKey);
          const fullText = words.filter(w => w.ayahKey === word.ayahKey).map(w => w.text).join(" ");
          setSelectedAyahText(fullText);
          setActiveModal('menu');
        }
      };

// جلب التفسير الميسر
const fetchTafsir = useCallback(async (key) => {
  if (!key) return;
  setTafsirLoading(true);
  try {
    const res = await fetch(`https://api.quran.com/api/v4/tafsirs/169/by_ayah/${key}`);
    const json = await res.json();
    setTafsirText(json.tafsir?.text?.replace(/<[^>]+>/g, '') || "التفسير غير متوفر حالياً.");
  } catch (e) {
    setTafsirText("حدث خطأ أثناء جلب التفسير.");
  } finally {
    setTafsirLoading(false);
  }
}, []);

// تنقل التفسير للآية التالية أو السابقة
const navigateAyah = (dir) => {
  if (!selectedAyahKey) return;
  const [s, a] = selectedAyahKey.split(':').map(Number);
  const nextA = dir === 'next' ? a + 1 : Math.max(1, a - 1);
  const newKey = `${s}:${nextA}`;
  setSelectedAyahKey(newKey);
  const txt = words.filter(w => w.ayahKey === newKey).map(w => w.text).join(" ");
  setSelectedAyahText(txt || "نص الآية");
  fetchTafsir(newKey);
};

// توليد صورة الآية الفخمة
const generateAyahImage = async () => {
  if (!cardRef.current) return;
  setIsGeneratingImage(true);
  try {
    const canvas = await html2canvas(cardRef.current, { backgroundColor: '#0b1411', scale: 2 });
    const image = canvas.toDataURL("image/png");
    const link = document.createElement('a');
    link.href = image;
    link.download = `Ayah_${selectedAyahKey}.png`;
    link.click();
  } catch (e) {
    alert("حدث خطأ أثناء تحميل الصورة.");
  } finally {
    setIsGeneratingImage(false);
  }
};


      
      // 10) دالة المشاركة الاحترافية مع الـ Fallback
      const handleShare = () => {
        if (navigator.share) {
          navigator.share({
            title: `آية من ${meta.surahName}`,
            text: selectedAyahText
          }).catch(() => {});
        } else {
          navigator.clipboard.writeText(selectedAyahText);
          alert("تم نسخ نص الآية بنجاح!");
        }
      };

      const pageLines = Array.from({ length: 15 }, (_, i) => i + 1);

      return (
        <div className={`flex flex-col h-screen w-full ${night ? 'bg-[#0b1411] text-[#E9E0CC]' : 'bg-[#EFE7D3] text-[#241C12]'} transition-colors duration-300`}>
          
    {/* الهيدر العلوي المشروط */}
{showControls && (
  <header className="w-full py-2.5 px-4 flex items-center justify-between bg-[#123328] text-white shadow-xl z-40 transition-all duration-300">
    <div className="flex items-center gap-3 text-base">
      <button onClick={() => setNight(!night)} title="الوضع">{night ? "🌙" : "☀️"}</button>
      <button onClick={() => setActiveModal('repeater')} title="تكرار الآيات">🔁</button>
      <button onClick={() => alert(`تم حفظ العلامة عند الصفحة ${page}`)} title="علامة مرجعية">🔖</button>
    </div>
    <div className="text-center">
      <div className="text-sm font-bold text-amber-300">{meta.surahName}</div>
      <div className="text-[10px] opacity-80 text-emerald-300">الجزء {toArabicNumber(meta.juz)}</div>
    </div>
    <div className="text-xs font-bold text-amber-300 bg-emerald-950/70 px-2.5 py-1 rounded-md border border-amber-500/20">
      {toArabicNumber(page)} / {toArabicNumber(TOTAL_PAGES)}
    </div>
  </header>
)}

          {/* منطقة المصحف الإطار والأنيميشن */}
<main 
  onClick={() => setShowControls(prev => !prev)}
  className="w-full h-screen flex items-center justify-center p-0 overflow-hidden relative cursor-pointer bg-[#0b1411]"
  onTouchStart={handleTouchStart}
  onTouchMove={handleTouchMove}
  onTouchEnd={handleTouchEnd}
>
  <div className="mushaf-frame-wahi">
    
    {/* هيدر معلومات الصفحة المدمج (اسم الجزء يمين واسم السورة شمال) */}
    <div className="flex items-center justify-between text-[13px] font-bold text-amber-200/80 px-2 pt-1 border-b border-amber-500/10 pb-1">
      <span>الجزء {toArabicNumber(meta.juz)}</span>
      <span className="text-amber-300">{meta.surahName}</span>
    </div>

    {/* منطقة القراءة والـ 15 سطر */}
    <div className="flex-1 flex flex-col justify-between py-2">
      {(loading || !fontLoaded) ? (
        <div className="my-auto text-center text-amber-400 font-semibold text-sm animate-pulse flex flex-col items-center gap-2">
          <div className="w-8 h-8 border-2 border-amber-400 border-t-transparent rounded-full animate-spin"></div>
          <span>جاري تحميل الصفحة بالرسم العثماني...</span>
        </div>
      ) : (
        <div className="qcf-page-container page-fade">
          {pageLines.map((line) => {
            const lineWords = groupedLines[line] || [];
            const isSurahStart = lineWords.some(w => w.ayahKey && w.ayahKey.endsWith(':1') && !w.ayahKey.startsWith('1:') && !w.ayahKey.startsWith('9:'));
            const isFirstWordOfSurah = lineWords.length > 0 && lineWords[0].ayahKey && lineWords[0].ayahKey.endsWith(':1');

            return (
              <React.Fragment key={line}>
                {isSurahStart && isFirstWordOfSurah && (
                  <div className="w-full text-center py-1 my-0.5 text-amber-300 font-bold text-xs tracking-widest border-y border-amber-500/20 bg-amber-500/5 rounded">
                    بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ
                  </div>
                )}
                <div className="quran-line">
                  {lineWords.map((w) => {
                    const isSelected = selectedAyahKey === w.ayahKey;
                    return (
<span
  key={w.id}
  onTouchStart={(e) => handleWordTouchStart(w, e)}
  onTouchEnd={handleWordTouchEnd}
  onMouseDown={(e) => handleWordTouchStart(w, e)}
  onMouseUp={handleWordTouchEnd}
  className={`quran-word ${isSelected ? 'quran-word-selected' : ''}`}
  style={{ fontFamily: `QCF_V2_P${page}` }}
>
  {w.code}
</span>
                    );
                  })}
                </div>
              </React.Fragment>
            );
          })}
        </div>
      )}
    </div>

    {/* فوتر رقم الصفحة المزخرف مثل تطبيق وحي */}
    <div className="text-center pt-1 pb-1">
      <span className="wahi-page-badge">
        {toArabicNumber(page)}
      </span>
    </div>

  </div>
</main>

{/* الشريط السفلي العائم */}
          {showControls && (
            <footer className="fixed bottom-0 inset-x-0 bg-[#123328] border-t border-emerald-700/50 p-3 flex flex-col gap-2 z-40 transition-all duration-300">
              {/* شريط تقدم الصفحة */}
              <div className="flex items-center gap-2 px-2">
                <span className="text-[10px] text-amber-200 font-bold">{toArabicNumber(1)}</span>
                <input 
                  type="range" 
                  min="1" 
                  max={TOTAL_PAGES} 
                  value={page} 
                  onChange={(e) => handlePageChange(Number(e.target.value))}
                  className="w-full accent-amber-400 h-1.5 bg-emerald-950 rounded-lg cursor-pointer"
                />
                <span className="text-[10px] text-amber-200 font-bold">{toArabicNumber(TOTAL_PAGES)}</span>
              </div>

              {/* أزرار التحكم والتشغيل والبحث */}
              <div className="flex items-center justify-around text-amber-200 text-xl pt-1">
                <button onClick={() => setShowJump(true)} title="بحث/انتقال">🔍</button>
                <button onClick={() => setActiveModal('repeater')} title="تكرار الآيات">🔁</button>
                <button 
                  onClick={() => {
                    const [sNum, aNum] = (selectedAyahKey || `${page}:1`).split(':');
                    const audio = new Audio(`https://everyayah.com/data/Alafasy_128kbps/${String(sNum||1).padStart(3,'0')}${String(aNum||1).padStart(3,'0')}.mp3`);
                    audio.play().catch(() => alert("جاري التشغيل..."));
                  }} 
                  className="w-10 h-10 rounded-full bg-amber-500 text-emerald-950 flex items-center justify-center font-bold text-lg shadow-md cursor-pointer"
                  title="تشغيل الصوت"
                >
                  ▶️
                </button>
                <button onClick={() => alert(`تم حفظ العلامة عند الصفحة ${page}`)} title="العلامات">🔖</button>
                <button onClick={() => handlePageChange(page + 1)} title="التالي">⏭️</button>
              </div>
            </footer>
          )}



          
         
{/* قائمة خيارات الآية */}
          {selectedAyahKey && activeModal === 'menu' && (
            <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-xs flex items-end justify-center p-0 sm:p-4" onClick={() => { setSelectedAyahKey(null); setActiveModal(null); }}>
              <div onClick={(e) => e.stopPropagation()} className={`bottom-sheet-anim w-full sm:max-w-md ${night ? 'bg-[#121f1a] text-amber-100 border-amber-500/30' : 'bg-[#FFFDF7] text-[#241C12] border-[#b8862f]'} border-t sm:border rounded-t-2xl sm:rounded-2xl p-5 shadow-2xl`}>
                <div className="flex items-center justify-between border-b border-amber-500/20 pb-3 mb-4">
                  <span className="text-sm font-bold text-amber-300">
                    الآية ({toArabicNumber(selectedAyahKey.split(':')[1])}) - {meta.surahName}
                  </span>
                  <button onClick={() => { setSelectedAyahKey(null); setActiveModal(null); }} className="text-xs bg-amber-500/20 px-2.5 py-1 rounded-full text-amber-300">✕</button>
                </div>

                <div className="grid grid-cols-2 gap-2.5 text-xs font-semibold">
                  <button onClick={() => { fetchTafsir(selectedAyahKey); setActiveModal('tafsir'); }} className="p-3 rounded-xl bg-emerald-900/30 border border-emerald-700/30 text-amber-200 flex items-center justify-center gap-2">
                    📖 التفسير الميسر
                  </button>
                  <button onClick={() => setActiveModal('shareChoice')} className="p-3 rounded-xl bg-emerald-900/30 border border-emerald-700/30 text-amber-200 flex items-center justify-center gap-2">
                    📤 مشاركة (نص / صورة)
                  </button>
                  <button onClick={() => { setStartAyahKey(selectedAyahKey); setActiveModal('repeater'); }} className="p-3 rounded-xl bg-emerald-900/30 border border-emerald-700/30 text-amber-200 flex items-center justify-center gap-2">
                    🔁 تحديد لتكرار التلاوة
                  </button>
                  <button onClick={() => alert(`تم حفظ العلامة عند الآية ${selectedAyahKey}`)} className="p-3 rounded-xl bg-emerald-900/30 border border-emerald-700/30 text-amber-200 flex items-center justify-center gap-2">
                    🔖 حفظ علامة وقوف
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* اختيار طريقة المشاركة */}
          {activeModal === 'shareChoice' && (
            <div className="fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4" onClick={() => setActiveModal('menu')}>
              <div onClick={e => e.stopPropagation()} className="bg-[#121f1a] border border-amber-500/40 w-full max-w-xs rounded-2xl p-5 text-center text-amber-100">
                <h3 className="text-sm font-bold text-amber-300 mb-4">اختر طريقة المشاركة</h3>
                <div className="flex flex-col gap-3 text-xs font-bold">
                  <button onClick={handleShare} className="py-3 bg-emerald-900/50 border border-emerald-700/40 rounded-xl">📝 مشاركة كنص</button>
                  <button onClick={() => setActiveModal('imageCard')} className="py-3 bg-amber-600/80 rounded-xl text-white">🖼️ بطاقة صورة فخمة</button>
                </div>
              </div>
            </div>
          )}

          {/* مودال الصورة الفخمة للآية */}
          {activeModal === 'imageCard' && (
            <div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4" onClick={() => setActiveModal('menu')}>
              <div onClick={e => e.stopPropagation()} className="flex flex-col items-center gap-4 w-full max-w-sm">
                <div ref={cardRef} className="bg-gradient-to-b from-[#121f1a] to-[#0b1411] border-2 border-amber-500/50 p-6 rounded-3xl text-center shadow-2xl relative w-full">
                  <div className="text-amber-400 font-bold text-xs mb-3 border-b border-amber-500/20 pb-2">سورة {meta.surahName} - آية ({toArabicNumber(selectedAyahKey.split(':')[1])})</div>
                  <div className="text-base leading-loose text-amber-100 font-serif my-4 px-2">" {selectedAyahText} "</div>
                  <div className="text-[10px] text-amber-500/70 mt-4 border-t border-amber-500/20 pt-2 font-bold">تطبيق أثر - المصحف الشريف</div>
                </div>
                <button onClick={generateAyahImage} disabled={isGeneratingImage} className="w-full py-3 bg-amber-600 text-white font-bold rounded-xl text-xs shadow-lg">
                  {isGeneratingImage ? "جاري التوليد..." : "📥 تحميل الصورة"}
                </button>
              </div>
            </div>
          )}

          {/* مودال التفسير الميسر مع أسهم التنقل < > */}
          {activeModal === 'tafsir' && (
            <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-xs flex items-center justify-center p-4" onClick={() => setActiveModal('menu')}>
              <div onClick={e => e.stopPropagation()} className="bg-[#121f1a] border border-amber-500/40 w-full max-w-lg rounded-2xl p-5 text-amber-100 max-h-[80vh] flex flex-col justify-between">
                <div>
                  <div className="flex items-center justify-between border-b border-amber-500/20 pb-2 mb-3">
                    <h3 className="text-sm font-bold text-amber-300">التفسير الميسر للآية ({toArabicNumber(selectedAyahKey?.split(':')[1])})</h3>
                    <button onClick={() => setActiveModal('menu')} className="text-xs bg-amber-500/20 px-2 py-0.5 rounded-full text-amber-300">✕</button>
                  </div>
                  <p className="text-xs leading-relaxed text-emerald-100/90 bg-emerald-950/40 p-3 rounded-xl border border-emerald-800/40 mb-3">
                    {selectedAyahText}
                  </p>
                  <div className="text-xs leading-relaxed text-amber-100/80 bg-amber-950/20 p-3 rounded-xl border border-amber-800/30 min-h-[100px]">
                    {tafsirLoading ? "جاري جلب التفسير..." : tafsirText}
                  </div>
                </div>

                {/* أسهم التنقل بين الآيات */}
                <div className="flex items-center justify-between pt-4 border-t border-amber-500/20 mt-3">
                  <button onClick={() => navigateAyah('prev')} className="px-4 py-2 bg-emerald-900/50 border border-emerald-700/40 rounded-xl text-xs font-bold text-amber-200">
                    ▶️ الآية السابقة
                  </button>
                  <button onClick={() => navigateAyah('next')} className="px-4 py-2 bg-emerald-900/50 border border-emerald-700/40 rounded-xl text-xs font-bold text-amber-200">
                    الآية التالية ◀️
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* مودال مكرر التلاوة وتحديد المدى */}
          {activeModal === 'repeater' && (
            <div className="fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4" onClick={() => setActiveModal(null)}>
              <div onClick={e => e.stopPropagation()} className="bg-[#121f1a] border border-amber-500/40 w-full max-w-xs rounded-2xl p-5 text-amber-100 text-center">
                <h3 className="text-sm font-bold text-amber-300 mb-3">🔁 تحديد مدى والتكرار</h3>
                <div className="flex flex-col gap-3 text-xs mb-4 text-right">
                  <div>
                    <label className="block opacity-70 mb-1">آية البداية:</label>
                    <input type="text" value={startAyahKey || selectedAyahKey || "1:1"} onChange={e => setStartAyahKey(e.target.value)} className="w-full p-2 bg-emerald-950/60 border border-emerald-700/40 rounded-lg text-center text-amber-300" />
                  </div>
                  <div>
                    <label className="block opacity-70 mb-1">آية النهاية:</label>
                    <input type="text" value={endAyahKey || selectedAyahKey || "1:7"} onChange={e => setEndAyahKey(e.target.value)} className="w-full p-2 bg-emerald-950/60 border border-emerald-700/40 rounded-lg text-center text-amber-300" />
                  </div>
                  <div>
                    <label className="block opacity-70 mb-1">عدد مرات تكرار كل آية:</label>
                    <input type="number" min="1" max="10" value={repeatCount} onChange={e => setRepeatCount(Number(e.target.value))} className="w-full p-2 bg-emerald-950/60 border border-emerald-700/40 rounded-lg text-center text-amber-300" />
                  </div>
                </div>
                <button onClick={() => { alert(`تم ضبط التكرار لـ ${repeatCount} مرات من ${startAyahKey} إلى ${endAyahKey}`); setActiveModal(null); }} className="w-full py-2 bg-amber-600 text-white font-bold rounded-xl text-xs">
                  بدء التكرار
                </button>
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
