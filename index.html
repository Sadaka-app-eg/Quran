<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المصحف الشريف - Quran App</title>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Arabic Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@400;600;700&family=Reem+Kufi:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }
    
    .quran-text {
      font-family: 'Amiri', serif;
      word-spacing: 2px;
      letter-spacing: 0px;
    }

    .surah-title {
      font-family: 'Reem Kufi', sans-serif;
    }

    /* زخرفة رقم الآية */
    .ayah-container {
      transition: background-color 0.25s ease, color 0.25s ease;
      border-radius: 6px;
      padding: 2px 4px;
      cursor: pointer;
    }

    .ayah-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.8em;
      height: 1.8em;
      border-radius: 50%;
      font-size: 0.65em;
      vertical-align: middle;
      margin: 0 4px;
      font-family: 'Cairo', sans-serif;
      font-weight: bold;
    }

    /* تحسين إطار المصحف */
    .mushaf-border {
      box-shadow: inset 0 0 0 2px #b8862f, inset 0 0 0 6px #2f5d46, inset 0 0 0 8px #b8862f;
    }

    /* Scrollbar لطيف */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-thumb {
      background: #b8862f;
      border-radius: 4px;
    }
  </style>
</head>
<body class="bg-[#EFE7D3] text-[#241C12]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const BISMILLAH = "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ";
    const TOTAL_PAGES = 604;

    const numeralsAr = ["٠","١","٢","٣","٤","٥","٦","٧","٨","٩"];
    function toArabicNumber(n) {
      return String(n).split("").map(d => numeralsAr[+d] ?? d).join("");
    }

    function App() {
      const [page, setPage] = useState(1);
      const [pageInput, setPageInput] = useState("1");
      const [night, setNight] = useState(false);
      const [ayahs, setAyahs] = useState([]);
      const [meta, setMeta] = useState({ juz: null, surahName: "" });
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      
      // الآية المحددة للخيارات والتظليل
      const [selectedAyah, setSelectedAyah] = useState(null);
      const [playingId, setPlayingId] = useState(null);
      const [copied, setCopied] = useState(false);
      
      const audioRef = useRef(null);

      // جلب بيانات الصفحة من API المعتمد على Tanzil
      const fetchPage = useCallback(async (p) => {
        setLoading(true);
        setError(null);
        setSelectedAyah(null);

        try {
          // استدعاء بيانات النص العثماني برواية حفص (Tanzil Text)
          const res = await fetch(`https://api.alquran.cloud/v1/page/${p}/quran-uthmani`);
          const json = await res.json();

          if (json.code === 200 && json.data) {
            const list = json.data.ayahs || [];
            setAyahs(list);
            
            const firstAyah = list[0];
            const lastAyah = list[list.length - 1];
            
            setMeta({
              juz: firstAyah?.juz,
              surahName: firstAyah?.surah?.name || ""
            });
          } else {
            throw new Error("فشل في تحميل بيانات الصفحة");
          }
        } catch (e) {
          setError("تعذر الاتصال بالخادم، يرجى التأكد من اتصال الإنترنت.");
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => {
        fetchPage(page);
        setPageInput(String(page));
      }, [page, fetchPage]);

      const goToPage = (p) => {
        const clamped = Math.min(TOTAL_PAGES, Math.max(1, p));
        setPage(clamped);
      };

      const handlePageSubmit = (e) => {
        e.preventDefault();
        const n = parseInt(pageInput, 10);
        if (!isNaN(n) && n >= 1 && n <= TOTAL_PAGES) {
          goToPage(n);
        } else {
          setPageInput(String(page));
        }
      };

      const togglePlayAudio = (ayah) => {
        if (playingId === ayah.number) {
          audioRef.current?.pause();
          setPlayingId(null);
        } else {
          const audioUrl = `https://cdn.islamic.network/quran/audio/128/ar.alafasy/${ayah.number}.mp3`;
          if (audioRef.current) {
            audioRef.current.src = audioUrl;
            audioRef.current.play().catch(() => {});
            setPlayingId(ayah.number);
          }
        }
      };

      const copyAyahText = (text) => {
        navigator.clipboard?.writeText(text).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      };

      // الثيمات (ليلي / نهار)
      const theme = night ? {
        bg: "bg-[#100D09]",
        pageBg: "bg-[#1A150F]",
        border: "border-[#8A6B2E]",
        text: "text-[#E9E0CC]",
        textMuted: "text-[#B9AD91]",
        headerBg: "bg-[#0D1512]",
        accent: "#C9A227",
        highlight: "bg-[#3A2F1E] text-[#F3E9CE]",
        chip: "bg-[#221C13]"
      } : {
        bg: "bg-[#EFE7D3]",
        pageBg: "bg-[#FBF5E6]",
        border: "border-[#B8862F]",
        text: "text-[#241C12]",
        textMuted: "text-[#5B4C36]",
        headerBg: "bg-[#123328]",
        accent: "#B8862F",
        highlight: "bg-[#F5E6C8] text-[#123328]",
        chip: "bg-[#F1E8D3]"
      };

      return (
        <div className={`min-h-screen w-full flex flex-col items-center ${theme.bg} transition-colors duration-300`}>
          <audio ref={audioRef} onEnded={() => setPlayingId(null)} />

          {/* الهيدر العلوي */}
          <header className={`w-full sticky top-0 z-20 ${theme.headerBg} text-white shadow-md px-4 py-3 flex flex-col gap-3`}>
            <div className="max-w-4xl mx-auto w-full flex items-center justify-between">
              
              {/* زر الوضع الليلي */}
              <button 
                onClick={() => setNight(!night)} 
                className="p-2 rounded-full bg-white/10 hover:bg-white/20 transition"
                title="تغيير المظهر"
              >
                {night ? <i data-lucide="sun" className="w-5 h-5 text-yellow-400"></i> : <i data-lucide="moon" className="w-5 h-5 text-amber-200"></i>}
              </button>

              {/* معلومات السورة والجزء */}
              <div className="text-center">
                <h1 className="text-lg font-bold text-[#F3E9CE] surah-title">{meta.surahName || "المصحف الشريف"}</h1>
                <span className="text-xs text-white/70">
                  {meta.juz ? `الجزء ${toArabicNumber(meta.juz)}` : ""}
                </span>
              </div>

              {/* التنقل بين الصفحات */}
              <form onSubmit={handlePageSubmit} className="flex items-center gap-2">
                <input
                  type="text"
                  value={pageInput}
                  onChange={(e) => setPageInput(e.target.value.replace(/[^0-9]/g, ""))}
                  className="w-12 text-center bg-white/10 text-[#F3E9CE] rounded py-1 text-sm outline-none border border-white/20 focus:border-[#C9A227]"
                />
                <span className="text-xs text-white/60">/ {toArabicNumber(TOTAL_PAGES)}</span>
              </form>
            </div>
          </header>

          {/* عرض صفحة المصحف */}
          <main className="w-full flex-1 flex justify-center items-center px-2 py-6">
            <div className="w-full max-w-[650px]">
              
              {loading && (
                <div className="flex flex-col items-center justify-center gap-3 py-32 text-amber-800">
                  <div className="animate-spin rounded-full h-10 w-10 border-b-2 border-amber-800"></div>
                  <span className="text-sm font-semibold">جاري تحميل الصفحة...</span>
                </div>
              )}

              {error && (
                <div className="flex flex-col items-center gap-4 py-24 text-center">
                  <p className="text-red-600 font-medium">{error}</p>
                  <button 
                    onClick={() => fetchPage(page)}
                    className="px-5 py-2 bg-[#B8862F] text-white rounded-full font-semibold shadow hover:opacity-90"
                  >
                    إعادة المحاولة
                  </button>
                </div>
              )}

              {!loading && !error && (
                <div className={`relative p-6 sm:p-10 rounded-lg ${theme.pageBg} ${theme.text} shadow-2xl border-4 ${theme.border}`}>
                  
                  {/* زوايا ديكورية للمصحف */}
                  <div className="absolute top-2 right-2 w-4 h-4 border-t-2 border-r-2 border-[#B8862F]"></div>
                  <div className="absolute top-2 left-2 w-4 h-4 border-t-2 border-l-2 border-[#B8862F]"></div>
                  <div className="absolute bottom-2 right-2 w-4 h-4 border-b-2 border-r-2 border-[#B8862F]"></div>
                  <div className="absolute bottom-2 left-2 w-4 h-4 border-b-2 border-l-2 border-[#B8862F]"></div>

                  {/* تجميع الآيات حسب السورة */}
                  {groupBySurah(ayahs).map((group, gIdx) => (
                    <div key={gIdx} className="mb-6">
                      
                      {/* رأس السورة */}
                      {group.showHeader && (
                        <div className="my-4 py-2 px-4 rounded-md border border-[#B8862F]/40 bg-gradient-to-r from-transparent via-[#B8862F]/15 to-transparent text-center">
                          <span className="surah-title text-xl font-bold text-[#B8862F]">
                            {group.surah.name}
                          </span>
                        </div>
                      )}

                      {/* البسملة */}
                      {group.showHeader && group.surah.number !== 1 && group.surah.number !== 9 && (
                        <div className="quran-text text-center text-lg my-3 text-[#B8862F]">
                          {BISMILLAH}
                        </div>
                      )}

                      {/* نص الصفحة الكاملة */}
                      <div className="quran-text text-justify text-xl sm:text-2xl leading-[2.3] sm:leading-[2.5]" dir="rtl">
                        {group.items.map((a) => {
                          const isSelected = selectedAyah?.number === a.number;
                          return (
                            <span
                              key={a.number}
                              onClick={() => setSelectedAyah(isSelected ? null : a)}
                              className={`ayah-container ${isSelected ? theme.highlight : "hover:bg-amber-500/10"}`}
                            >
                              <span>{a.text}</span>
                              <span className="ayah-num border border-[#B8862F]/60 text-[#B8862F] bg-amber-500/5">
                                {toArabicNumber(a.numberInSurah)}
                              </span>
                            </span>
                          );
                        })}
                      </div>
                    </div>
                  ))}

                  {/* رقم الصفحة السفلي */}
                  <div className="text-center mt-6 text-sm font-semibold opacity-60 border-t border-amber-900/10 pt-3">
                    {toArabicNumber(page)}
                  </div>
                </div>
              )}
            </div>
          </main>

          {/* شريط التحكم بالصفحات (الأزرار السفلية) */}
          <footer className="w-full sticky bottom-0 bg-[#123328] text-white py-3 px-4 shadow-lg flex justify-center items-center gap-6 z-10">
            <button
              onClick={() => goToPage(page + 1)}
              disabled={page >= TOTAL_PAGES}
              className="flex items-center gap-1 bg-white/10 hover:bg-white/20 disabled:opacity-30 px-4 py-2 rounded-full text-sm font-semibold transition"
            >
              <i data-lucide="chevron-right" className="w-4 h-4"></i>
              <span>الصفحة التالية</span>
            </button>

            <span className="text-sm font-bold text-[#C9A227]">
              {toArabicNumber(page)}
            </span>

            <button
              onClick={() => goToPage(page - 1)}
              disabled={page <= 1}
              className="flex items-center gap-1 bg-white/10 hover:bg-white/20 disabled:opacity-30 px-4 py-2 rounded-full text-sm font-semibold transition"
            >
              <span>الصفحة السابقة</span>
              <i data-lucide="chevron-left" className="w-4 h-4"></i>
            </button>
          </footer>

          {/* قائمة الخيارات للآية المحددة (Bottom Action Sheet) */}
          {selectedAyah && (
            <div 
              className="fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4"
              onClick={() => setSelectedAyah(null)}
            >
              <div 
                onClick={(e) => e.stopPropagation()}
                className={`w-full sm:w-96 ${theme.pageBg} ${theme.text} rounded-t-2xl sm:rounded-2xl p-5 shadow-2xl border-t-2 sm:border-2 ${theme.border} animate-in slide-in-from-bottom duration-200`}
              >
                <div className="flex items-center justify-between pb-3 mb-3 border-b border-amber-900/10">
                  <span className="font-bold text-sm text-[#B8862F]">
                    {selectedAyah.surah.name} - الآية ({toArabicNumber(selectedAyah.numberInSurah)})
                  </span>
                  <button onClick={() => setSelectedAyah(null)} className="p-1 hover:opacity-70">
                    <i data-lucide="x" className="w-5 h-5"></i>
                  </button>
                </div>

                <div className="flex flex-col gap-2.5">
                  {/* زر التلاوة */}
                  <button
                    onClick={() => togglePlayAudio(selectedAyah)}
                    className={`flex items-center justify-between px-4 py-3 rounded-xl ${theme.chip} hover:opacity-90 transition text-sm font-semibold`}
                  >
                    <span className="flex items-center gap-2">
                      <i data-lucide={playingId === selectedAyah.number ? "pause" : "play"} className="w-4 h-4 text-[#B8862F]"></i>
                      {playingId === selectedAyah.number ? "إيقاف التلاوة" : "استماع للآية (العفاسي)"}
                    </span>
                  </button>

                  {/* زر النسخ */}
                  <button
                    onClick={() => copyAyahText(selectedAyah.text)}
                    className={`flex items-center justify-between px-4 py-3 rounded-xl ${theme.chip} hover:opacity-90 transition text-sm font-semibold`}
                  >
                    <span className="flex items-center gap-2">
                      <i data-lucide={copied ? "check" : "copy"} className="w-4 h-4 text-[#B8862F]"></i>
                      {copied ? "تم نسخ النص!" : "نسخ النص العثماني"}
                    </span>
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // دالة تجميع الآيات حسب السورة داخل الصفحة
    function groupBySurah(ayahs) {
      const groups = [];
      let lastSurahNumber = null;

      ayahs.forEach((a) => {
        if (a.surah.number !== lastSurahNumber) {
          groups.push({
            surah: a.surah,
            showHeader: true,
            items: [a]
          });
          lastSurahNumber = a.surah.number;
        } else {
          groups[groups.length - 1].items.push(a);
        }
      });
      return groups;
    }

    // تشغيل التطبيق وتحديث أيقونات Lucide
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);

    setTimeout(() => {
      if (window.lucide) window.lucide.createIcons();
    }, 500);
  </script>
</body>
</html>
